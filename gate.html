<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جاري التحقق...</title>
  <style>
    body {
      background: #02040d;
      color: #eef5ff;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .msg {
      background: rgba(0,229,255,0.05);
      border: 1px solid rgba(0,229,255,0.3);
      padding: 30px 40px;
      border-radius: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="msg" id="status">⏳ جاري التحقق من المصدر...</div>

  <script>
    const OUO_DOMAIN = "ouo.io";
    const TARGET_APP = "app.html";

    const ref = document.referrer;

    if (ref.includes(OUO_DOMAIN)) {
      // قادم من Ouo.io ← ضع علامة العبور
      sessionStorage.setItem('from_ouo', 'yes');
      // إعادة التوجيه للتطبيق الرئيسي
      window.location.href = TARGET_APP;
    } else {
      // لم يأت من Ouo.io
      document.getElementById('status').innerHTML = `
        <h2>🚫 وصول غير مصرح</h2>
        <p>يجب عليك المرور عبر البوابة الرسمية أولاً.</p>
      `;
    }
  </script>
</body>
</html>
