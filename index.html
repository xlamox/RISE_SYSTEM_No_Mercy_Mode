<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=yes, viewport-fit=cover" />
  <title>RISE SYSTEM — OBJECT INTRO</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&family=Inter:opsz,wght@14..32,300..900&family=IBM+Plex+Sans+Arabic:wght@100..700&display=swap" rel="stylesheet">

  <style>
    :root {
      --c1: #00E5FF;
      --c2: #A855F7;
      --c3: #10B981;
      --c4: #F59E0B;
      --bg: #02040d;
      --glass: rgba(255,255,255,0.04);
      --line: rgba(255,255,255,0.12);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; background: var(--bg); }
    body {
      font-family: 'Inter', 'IBM Plex Sans Arabic', system-ui, sans-serif;
      color: #eef5ff;
      cursor: none;
    }

    /* ═══════════════ CURSOR GLOW ═══════════════ */
    .cursor-glow {
      position: fixed;
      width: 350px; height: 350px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.18) 0%, transparent 70%);
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
      transition: opacity 0.2s;
    }

    /* ═══════════════ THREE.JS SCENE ═══════════════ */
    #bgCanvas {
      position: fixed; inset:0; z-index:0; pointer-events: none;
    }

    /* ═══════════════ SHARDS (CSS 3D) ═══════════════ */
    .shards-layer {
      position: fixed; inset:0; z-index:1; pointer-events:none;
      perspective: 800px;
    }
    .shard {
      position: absolute;
      width: 160px; height: 240px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.01) 40%, rgba(255,255,255,0.05) 70%);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 30px 80px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.04);
      backdrop-filter: blur(6px);
      mix-blend-mode: screen;
      transform-style: preserve-3d;
      animation: floatShard 14s ease-in-out infinite alternate;
      opacity: 0.5;
    }
    .shard::after {
      content:""; position:absolute; inset:0;
      background: radial-gradient(circle at 30% 30%, rgba(0,229,255,0.3), transparent 60%),
                  radial-gradient(circle at 70% 60%, rgba(168,85,247,0.25), transparent 60%);
      filter: blur(12px);
      opacity:0.7;
    }
    @keyframes floatShard {
      0% { transform: translate3d(0,0,0) rotateX(5deg) rotateY(-10deg) rotateZ(2deg); }
      100% { transform: translate3d(25px,-30px,80px) rotateX(15deg) rotateY(-20deg) rotateZ(-4deg); }
    }

    /* ═══════════════ MAIN CARD ═══════════════ */
    .card {
      position: relative; z-index:10;
      width: min(1000px, 90%);
      margin: auto;
      top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--line);
      border-radius: 48px;
      padding: 50px 48px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardAppear 0.8s cubic-bezier(0.23,1,0.32,1) forwards;
      opacity:0; transform: translateY(30px);
    }
    @keyframes cardAppear { to { opacity:1; transform: translateY(-50%); } }

    /* ═══════════════ STATUS ═══════════════ */
    .badge {
      display:inline-flex; align-items:center; gap:10px;
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.4);
      font-size: 11px;
      font-family: 'Oxanium', monospace;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 28px;
    }
    .dot {
      width:10px; height:10px; border-radius:50%;
      background: var(--c1);
      box-shadow: 0 0 18px var(--c1);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(2)} }

    /* ═══════════════ TYPOGRAPHY ═══════════════ */
    h1 {
      font-family: 'Oxanium', 'Inter', sans-serif;
      font-weight: 800;
      font-size: clamp(40px, 8vw, 80px);
      line-height: 1.05;
      margin:0 0 12px 0;
      text-align: left;
    }
    .glitch {
      position:relative; display:inline-block; color:#fff;
      text-shadow: 0 0 30px rgba(0,229,255,0.5);
    }
    .glitch::before, .glitch::after {
      content:attr(data-text); position:absolute; top:0; left:0; width:100%; height:100%; opacity:0.8;
    }
    .glitch::before {
      color: var(--c2);
      animation: glitch1 2.5s infinite linear alternate-reverse;
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
      transform: translate(-2px, -1px);
    }
    .glitch::after {
      color: var(--c1);
      animation: glitch2 3s infinite linear alternate;
      clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
      transform: translate(2px, 1px);
    }
    @keyframes glitch1 {
      0%{transform:translate(0)} 20%{transform:translate(-3px,2px)} 40%{transform:translate(3px,-1px)} 60%{transform:translate(-1px,-2px)} 80%{transform:translate(2px,1px)} 100%{transform:translate(0)}
    }
    @keyframes glitch2 {
      0%{transform:translate(0)} 20%{transform:translate(3px,-1px)} 40%{transform:translate(-2px,2px)} 60%{transform:translate(1px,-2px)} 80%{transform:translate(-3px,1px)} 100%{transform:translate(0)}
    }

    .hero-gradient {
      background: linear-gradient(135deg, var(--c1), var(--c2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      color: rgba(255,255,255,0.55);
      font-size: 15px;
      line-height: 1.7;
      max-width: 650px;
      margin-bottom: 32px;
      text-align: left;
    }

    /* ═══════════════ CHIP ═══════════════ */
    .chip {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 30px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      font-family: 'Oxanium', monospace;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 15px rgba(168,85,247,0.7);
      transition: all 0.3s;
      vertical-align: middle;
      margin: 0 6px;
    }

    /* ═══════════════ BUTTON ═══════════════ */
    .btn-enter {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 16px 38px;
      border-radius: 100px;
      border: 1px solid var(--c1);
      background: rgba(0,229,255,0.1);
      backdrop-filter: blur(4px);
      color: white;
      font-family: 'Oxanium', monospace;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 30px rgba(0,229,255,0.3);
      letter-spacing: 0.5px;
      margin-right: 14px;
    }
    .btn-enter:hover {
      background: rgba(0,229,255,0.2);
      box-shadow: 0 0 50px rgba(0,229,255,0.6);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: rgba(255,255,255,0.7);
      padding: 12px 24px;
      border-radius: 100px;
      font-family: 'Oxanium', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(4px);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.05);
      color: white;
      border-color: rgba(255,255,255,0.4);
    }

    .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-left: 10px;
    }
    .kbd {
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      padding: 2px 8px;
      border-radius: 8px;
    }

    /* ═══════════════ EXIT ANIMATION ═══════════════ */
    .out {
      animation: cardOut 0.5s cubic-bezier(0.2,0.9,0.15,1) forwards;
    }
    @keyframes cardOut {
      0% { opacity:1; transform: translateY(-50%) scale(1); filter:blur(0); }
      100% { opacity:0; transform: translateY(-50%) scale(1.03); filter:blur(20px); }
    }

    /* ═══════════════ SCENE2 OVERLAY ═══════════════ */
    #scene2Frame {
      position: fixed; inset:0; border:0; width:100%; height:100vh;
      display:none; z-index: 9999; background: #000;
    }
    #scene2Frame.show { display:block; }

    /* ═══════════════ RESPONSIVE ═══════════════ */
    @media (max-width: 768px) {
      body { cursor: auto; }
      .cursor-glow { display: none; }
      .card { padding: 32px 24px; border-radius: 36px; }
      .btn-enter { width:100%; justify-content:center; }
    }
    @media (prefers-reduced-motion: reduce) {
      .glitch::before, .glitch::after { animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="cursor-glow" id="cursorGlow"></div>
  <canvas id="bgCanvas"></canvas>

  <div class="shards-layer" id="shardsContainer"></div>

  <div class="card" id="mainCard">
    <div class="badge">
      <span class="dot"></span> INIT • RISE PROTOCOL <span style="opacity:0.6; margin-left:4px;">• ONLINE</span>
    </div>

    <h1>
      <span class="glitch" data-text="SYSTEM">SYSTEM</span><br>
      <span class="hero-gradient">BECOME A</span><br>
      <span id="dynamicWord" class="chip">DISCIPLINED</span><br>
      <span class="hero-gradient">HERO</span>
    </h1>

    <p class="sub">
      نظام تقييم يومي صارم بلا رحمة. اليوم يُغلق تلقائياً عند 00:00. الرادار الحي يرصد قوتك. الإهمال يُعاقب أُسياً، والالتزام يُكافأ. كل نقرة تشكلك.
    </p>

    <div style="display:flex; align-items:center; flex-wrap:wrap; gap:14px;">
      <button class="btn-enter" id="enterBtn">
        ENTER THE SYSTEM
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
      </button>
      <button class="btn-secondary" onclick="location.reload()">RECALIBRATE</button>
      <span class="hint">Press <span class="kbd">Enter</span> to enter</span>
    </div>
  </div>

  <!-- SCENE 2 IFRAME -->
  <iframe id="scene2Frame" title="SYSTEME scene"></iframe>

  <!-- AUDIO -->
  <audio id="systemAudio" src="system.mp3" preload="auto"></audio>

  <!-- THREE.JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    // ═══════════════ 1. CURSOR GLOW ═══════════════
    const cursor = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    // ═══════════════ 2. THREE.JS BACKGROUND ═══════════════
    const canvas = document.getElementById('bgCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.z = 20;

    // Particles
    const particlesGeo = new THREE.BufferGeometry();
    const count = 1500;
    const pos = new Float32Array(count * 3);
    const col = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i += 3) {
      pos[i] = (Math.random() - 0.5) * 35;
      pos[i+1] = (Math.random() - 0.5) * 22;
      pos[i+2] = (Math.random() - 0.5) * 12;
      const r = Math.random();
      if (r < 0.4) { col[i]=0; col[i+1]=0.89; col[i+2]=1.0; }
      else if (r < 0.7) { col[i]=0.66; col[i+1]=0.33; col[i+2]=0.97; }
      else { col[i]=0.06; col[i+1]=0.73; col[i+2]=0.51; }
    }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    particlesGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));
    const particlesMat = new THREE.PointsMaterial({ size:0.07, vertexColors:true, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.8 });
    const particles = new THREE.Points(particlesGeo, particlesMat);
    scene.add(particles);

    // Rings
    function ring(radius, color, opacity) {
      const g = new THREE.TorusGeometry(radius, 0.04, 32, 100);
      const m = new THREE.MeshBasicMaterial({ color, blending:THREE.AdditiveBlending, transparent:true, opacity });
      const r = new THREE.Mesh(g, m);
      r.userData = { speed: { x: (Math.random()-0.5)*0.004, y: (Math.random()-0.5)*0.004, z: (Math.random()-0.5)*0.004 } };
      r.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
      return r;
    }
    const rings = [
      ring(5.0, 0x00E5FF, 0.3),
      ring(5.8, 0xA855F7, 0.25),
      ring(4.5, 0x10B981, 0.25),
      ring(6.2, 0xF59E0B, 0.15)
    ];
    rings.forEach(r => scene.add(r));

    function animate() {
      requestAnimationFrame(animate);
      particles.rotation.y += 0.0002;
      particles.rotation.x += 0.0001;
      rings.forEach(r => {
        r.rotation.x += r.userData.speed.x;
        r.rotation.y += r.userData.speed.y;
        r.rotation.z += r.userData.speed.z;
      });
      renderer.render(scene, camera);
    }
    animate();
    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
    });

    // ═══════════════ 3. SHARDS (CSS) ═══════════════
    (function createShards() {
      const container = document.getElementById('shardsContainer');
      const count = window.innerWidth < 768 ? 5 : 10;
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'shard';
        s.style.width = (100 + Math.random()*160) + 'px';
        s.style.height = (150 + Math.random()*200) + 'px';
        s.style.left = (Math.random()*90) + '%';
        s.style.top = (Math.random()*90) + '%';
        s.style.animationDuration = (10 + Math.random()*10) + 's';
        s.style.animationDelay = -(Math.random()*5) + 's';
        container.appendChild(s);
      }
    })();

    // ═══════════════ 4. DYNAMIC WORD CHIP ═══════════════
    const words = ["DISCIPLINED", "UNSTOPPABLE", "FOCUSED", "DANGEROUS", "LEGENDARY"];
    let index = 0;
    const wordEl = document.getElementById('dynamicWord');
    setInterval(() => {
      wordEl.style.opacity = '0';
      wordEl.style.transform = 'translateY(8px)';
      setTimeout(() => {
        index = (index + 1) % words.length;
        wordEl.textContent = words[index];
        wordEl.style.opacity = '1';
        wordEl.style.transform = 'translateY(0)';
      }, 200);
    }, 2000);

    // ═══════════════ 5. AUDIO CONTROL ═══════════════
    const audio = document.getElementById('systemAudio');
    let audioStarted = false;
    function startAudio() {
      if (audioStarted) return;
      audio.play().catch(()=>{});
      audioStarted = true;
    }
    window.addEventListener('pointerdown', startAudio, { once: true });
    window.addEventListener('keydown', startAudio, { once: true });

    function stopAudio() {
      audio.pause();
      audio.currentTime = 0;
    }

    // ═══════════════ 6. SCENE2 HTML (SYSTEME) ═══════════════
    const SCENE2_HTML = `<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SYSTEME — Become a Hero</title>
<style>
  :root{--bg0:#050611;--bg1:#0b0d20;--txt:#f2f7ff;--muted:rgba(242,247,255,.66);--border:rgba(255,255,255,.14);}
  *{box-sizing:border-box}html,body{height:100%}
  body{margin:0;overflow:hidden;background:radial-gradient(1100px 680px at 68% 24%,rgba(255,255,255,.055),transparent 60%),radial-gradient(900px 700px at 28% 82%,rgba(255,255,255,.035),transparent 58%),linear-gradient(180deg,var(--bg1),var(--bg0));color:var(--txt);font-family:system-ui,-apple-system,sans-serif;}
  .vignette{position:fixed;inset:-25%;pointer-events:none;background:radial-gradient(closest-side at 50% 50%,transparent 40%,rgba(0,0,0,.70) 100%);mix-blend-mode:multiply;filter:blur(2px);opacity:.85;}
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block;opacity:.55;}
  .stage{position:fixed;inset:0;display:grid;place-items:center;pointer-events:none;}
  .wrap{text-align:center;transform:translateY(8px);}
  .word{position:relative;display:inline-block;font-weight:900;letter-spacing:.18em;text-transform:uppercase;font-size:clamp(54px,8vw,132px);line-height:1;opacity:0;transform:translateY(14px) scale(.985);filter:blur(12px);text-shadow:0 18px 90px rgba(0,0,0,.70);transition:opacity .9s ease,transform .9s ease,filter .9s ease;will-change:transform,filter,opacity;}
  .base{color:rgba(242,247,255,.94);}
  .gl{position:absolute;inset:0;opacity:0;pointer-events:none;mix-blend-mode:screen;overflow:hidden;}
  .gl::before,.gl::after{content:attr(data-text);position:absolute;inset:0;color:rgba(242,247,255,.92);filter:blur(.2px);}
  .sweep{position:absolute;top:-30%;left:-60%;width:50%;height:160%;background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.55),rgba(255,255,255,0));transform:skewX(-18deg);filter:blur(2px);opacity:0;pointer-events:none;}
  .tag{margin-top:18px;font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:rgba(242,247,255,.60);opacity:0;transform:translateY(10px);transition:opacity .9s ease,transform .9s ease;}
  .tag b{color:rgba(242,247,255,.82);font-weight:700;letter-spacing:.34em;}
  .rule{width:min(520px,70vw);height:1px;margin:18px auto 0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);opacity:0;transform:scaleX(.85);transition:opacity .9s ease,transform .9s ease;}
  body.ready .word{opacity:1;transform:translateY(0) scale(1);filter:blur(0px);}
  body.ready .tag{opacity:1;transform:translateY(0);transition-delay:.25s;}
  body.ready .rule{opacity:1;transform:scaleX(1);transition-delay:.18s;}
  .burst .gl{opacity:1;}
  .burst .gl::before{animation:g1 180ms steps(2) infinite;}
  .burst .gl::after{animation:g2 180ms steps(2) infinite;}
  @keyframes g1{0%{clip-path:inset(12% 0 78% 0);transform:translateX(10px)}40%{clip-path:inset(62% 0 22% 0);transform:translateX(-12px)}80%{clip-path:inset(28% 0 56% 0);transform:translateX(8px)}100%{clip-path:inset(0 0 88% 0);transform:translateX(6px)}}
  @keyframes g2{0%{clip-path:inset(78% 0 8% 0);transform:translateX(-10px)}40%{clip-path:inset(18% 0 64% 0);transform:translateX(12px)}80%{clip-path:inset(8% 0 78% 0);transform:translateX(-8px)}100%{clip-path:inset(90% 0 0 0);transform:translateX(-6px)}}
</style></head>
<body>
<canvas id="fx"></canvas><div class="vignette"></div>
<div class="stage"><div class="wrap"><div class="word" id="word"><span class="base">SYSTEME</span><span class="gl" data-text="SYSTEME"></span><span class="sweep" id="sweep"></span></div><div class="rule"></div><div class="tag"><b>BECOME A HERO</b></div></div></div>
<script>
(()=>{
  const c=document.getElementById('fx'),ctx=c.getContext('2d',{alpha:true,desynchronized:true});
  const W=()=>innerWidth,H=()=>innerHeight;
  function resize(){c.width=W();c.height=H();}
  addEventListener('resize',resize,{passive:true});resize();
  const stars=Array.from({length:400},()=>({x:Math.random()*W(),y:Math.random()*H(),z:Math.random(),r:0.6+Math.random()*1.2,tw:Math.random()*Math.PI*2}));
  const shards=[];
  function burst(n,x,y){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=200+Math.random()*400;shards.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.4+Math.random()*0.6,age:0,r:1+Math.random()*2,rot:Math.random()*Math.PI*2,vr:(Math.random()-0.5)*12});}}
  function glitchBurst(ms=180){word.classList.add('burst');setTimeout(()=>word.classList.remove('burst'),ms);}
  setTimeout(()=>document.body.classList.add('ready'),400);
  setTimeout(()=>{const p=(()=>{const r=word.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};})();burst(80,p.x,p.y);glitchBurst(210);sweep.style.opacity='1';sweep.animate([{transform:'translateX(-10%) skewX(-18deg)',opacity:0},{transform:'translateX(220%) skewX(-18deg)',opacity:1},{transform:'translateX(260%) skewX(-18deg)',opacity:0}],{duration:880,easing:'cubic-bezier(.2,.8,.2,1)',fill:'forwards'});},700);
  let last=performance.now();
  function frame(now){
    const dt=Math.min(0.033,(now-last)/1000);last=now;
    ctx.clearRect(0,0,W(),H());
    for(const s of stars){s.tw+=dt*(0.5+s.z*1.2);const tw=0.5+0.5*Math.sin(s.tw),a=(0.02+tw*0.08)*(0.35+s.z*0.9);ctx.beginPath();ctx.fillStyle='rgba(255,255,255,'+a+')';ctx.arc(s.x,s.y,s.r*(0.9+(1-s.z)*0.6),0,Math.PI*2);ctx.fill();}

  }

    const TARGET_APP = "app.html";
    let leaving = false;

    function enterSystem() {
      if (leaving) return;
      leaving = true;
      stopAudio();

      const card = document.getElementById('mainCard');
      card.classList.add('out');

      const frame = document.getElementById('scene2Frame');
      setTimeout(() => {
        frame.srcdoc = SCENE2_HTML;
        frame.classList.add('show');
      }, 240);

      setTimeout(() => {
        window.location.href = TARGET_APP;
      }, 4700);
    }

    document.getElementById('enterBtn').addEventListener('click', enterSystem);
    window.addEventListener('keydown', e => {
      if (e.key === 'Enter') enterSystem();
