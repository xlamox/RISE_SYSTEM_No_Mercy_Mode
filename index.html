<!DOCTYPE html> 
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>RISE SYSTEM™ - Dual Theme</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&family=IBM+Plex+Sans+Arabic:wght@100..700&display=swap" rel="stylesheet">

  <style id="theme-style">
    /* سيتم ملء هذا بالأنماط ديناميكياً */
  </style>

  <style>
    /* الأنماط المشتركة بين الثيمات */
    :root{
      --font-sans: "IBM Plex Sans Arabic", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --font-display: "Oxanium", "IBM Plex Sans Arabic", system-ui, sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font-sans);
      transition: background-color 0.3s ease, color 0.3s ease;
      overflow-x:hidden;
    }

    .theme-switcher {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      display: flex;
      gap: 12px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .theme-btn {
      cursor: pointer;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-display);
      transition: all 0.2s ease;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .theme-btn:hover {
      transform: translateY(-2px);
    }
    .theme-btn.active {
      background: linear-gradient(135deg, #00e5ff, #ffc107);
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 0 15px rgba(0,229,255,0.3);
      color: #000;
    }
    .theme-btn.theme1.active {
      background: linear-gradient(135deg, #00e5ff, #a855f7);
    }
    .theme-btn.theme2.active {
      background: linear-gradient(135deg, #ffc107, #ff8c00);
    }

    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
    .wrap{max-width:1200px; margin:0 auto; padding:28px 16px 40px;}

    .header{position:relative}
    .hero-glow{
      position:absolute; top:-40px; left:50%; transform:translateX(-50%);
      width:760px; height:200px; border-radius:999px;
      pointer-events:none;
    }

    .top-row{display:flex; gap:16px; align-items:flex-end; justify-content:space-between; flex-wrap:wrap;}

    .badge{
      display:inline-flex; align-items:center; gap:10px;
      padding:8px 12px; border-radius:999px;
      font-size:12px;
    }
    .dot{width:10px;height:10px;border-radius:50%;}
    .brand-name{font-family:var(--font-display); letter-spacing:.6px;}
    .brand-sub{}

    .title{margin:12px 0 6px; font-family:var(--font-display); font-size:40px; line-height:1.1;}
    .subtitle{margin:0; max-width:760px; font-size:14.5px; line-height:1.7;}

    .glitch-word{
      position: relative;
      display: inline-block;
      animation: glitch-skew 2.6s infinite ease-in-out;
      white-space: nowrap;
    }

    .glitch-word::before,
    .glitch-word::after{
      content: attr(data-text);
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .9;
    }

    .glitch-word::before{
      transform: translate(-2px, 0);
      clip-path: inset(0 0 55% 0);
      animation: glitch-top 1.1s infinite linear alternate-reverse;
      mix-blend-mode: screen;
    }

    .glitch-word::after{
      transform: translate(2px, 0);
      clip-path: inset(45% 0 0 0);
      animation: glitch-bottom 1.35s infinite linear alternate-reverse;
      mix-blend-mode: screen;
    }

    .glitch-word.self-word{
      animation: self-glitch-skew .9s infinite steps(2,end);
    }

    .glitch-word.self-word::before{
      transform: translate(-4px, -1px);
      clip-path: inset(0 0 62% 0);
      animation: self-glitch-top .45s infinite steps(2,end);
      opacity: .95;
    }

    .glitch-word.self-word::after{
      transform: translate(4px, 1px);
      clip-path: inset(58% 0 0 0);
      animation: self-glitch-bottom .38s infinite steps(2,end);
      opacity: .95;
    }

    @keyframes glitch-top{
      0%   { transform: translate(-2px, 0); }
      20%  { transform: translate(-3px, -1px); }
      40%  { transform: translate(-1px, 1px); }
      60%  { transform: translate(-4px, 0); }
      80%  { transform: translate(-2px, 1px); }
      100% { transform: translate(-3px, -1px); }
    }

    @keyframes glitch-bottom{
      0%   { transform: translate(2px, 0); }
      20%  { transform: translate(4px, 1px); }
      40%  { transform: translate(1px, -1px); }
      60%  { transform: translate(3px, 0); }
      80%  { transform: translate(2px, -1px); }
      100% { transform: translate(4px, 1px); }
    }

    @keyframes glitch-skew{
      0%, 100% { transform: skewX(0deg); }
      20%      { transform: skewX(-2deg); }
      21%      { transform: skewX(3deg); }
      22%      { transform: skewX(0deg); }
      65%      { transform: skewX(0deg); }
      66%      { transform: skewX(-3deg); }
      67%      { transform: skewX(2deg); }
      68%      { transform: skewX(0deg); }
    }

    @keyframes self-glitch-top{
      0%   { transform: translate(-5px,-1px); }
      25%  { transform: translate(-1px,2px); }
      50%  { transform: translate(-6px,0px); }
      75%  { transform: translate(-2px,-2px); }
      100% { transform: translate(-4px,1px); }
    }

    @keyframes self-glitch-bottom{
      0%   { transform: translate(5px,1px); }
      25%  { transform: translate(2px,-2px); }
      50%  { transform: translate(6px,0px); }
      75%  { transform: translate(3px,2px); }
      100% { transform: translate(4px,-1px); }
    }

    @keyframes self-glitch-skew{
      0%   { transform: skewX(0deg) scale(1); }
      20%  { transform: skewX(5deg) scale(1.01); }
      40%  { transform: skewX(-4deg) scale(.995); }
      60%  { transform: skewX(3deg) scale(1.01); }
      80%  { transform: skewX(-5deg) scale(.995); }
      100% { transform: skewX(0deg) scale(1); }
    }

    .chips{margin-top:12px; display:flex; flex-wrap:wrap; gap:8px;}
    .chip{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 12px; border-radius:999px;
      font-size:12px;
    }
    .chip-mono{font-family: ui-monospace, monospace;}

    .header-actions{
      margin-top:16px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .nav-btn{
      cursor:pointer;
      padding:10px 14px;
      border-radius:16px;
      font-size:13px;
      transition:.15s;
    }

    .stats{display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; width:370px; max-width:100%;}
    .stat{
      border-radius:18px; padding:12px;
      transition: all 0.2s ease;
    }
    .stat-k{font-size:11px; letter-spacing:2px;}
    .stat-v{margin-top:6px; font-family:var(--font-display); font-size:22px}
    .stat-s{margin-top:4px; font-size:11px;}

    .locked{
      margin-top:16px; border-radius:18px;
      padding:10px 14px;
    }
    .locked-row{display:flex; justify-content:space-between; align-items:center; gap:10px; font-size:13px;}

    .main{margin-top:22px; display:grid; gap:14px; grid-template-columns:1.35fr .65fr;}
    @media (max-width:980px){ .main{grid-template-columns:1fr} }

    .card{
      border-radius:24px;
      padding:14px;
    }

    .label{font-size:11px; letter-spacing:2px;}
    .section-title{margin-top:6px; font-family:var(--font-display); font-size:18px}
    .muted{font-size:12px}
    .tiny{display:flex; justify-content:space-between; gap:10px; font-size:11px}

    .card-row{display:flex; gap:12px; align-items:flex-end; justify-content:space-between; flex-wrap:wrap;}
    .quote{margin-top:6px; font-family:var(--font-display); font-size:18px;}

    .progress-row{display:flex; gap:14px; align-items:flex-end; justify-content:space-between; flex-wrap:wrap;}
    .big{margin-top:6px; font-family: var(--font-display); font-size:34px}

    .progress-side{width:280px; max-width:100%}
    .bar{width:100%; height:10px; border-radius:999px; overflow:hidden;}
    .fill{height:100%; width:0%; transition: width .25s ease; }

    .task-list{margin-top:12px; display:grid; gap:10px;}
    .task{border-radius:18px; padding:12px;}
    .task-top{display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;}

    .tag{
      display:inline-flex; align-items:center; gap:8px;
      border-radius:999px;
      padding:6px 10px; font-size:11px;
    }

    .task-title{font-family:var(--font-display); font-size:15px; max-width:360px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
    .task-meta{margin-top:6px; display:flex; flex-wrap:wrap; gap:10px; font-size:11px;}

    .task-controls{display:flex; align-items:center; gap:8px;}
    .input{
      width:100%; padding:10px 12px; border-radius:16px;
      outline:none;
    }
    .input:disabled{opacity:.6}
    .small{width:92px; padding:8px 10px; border-radius:14px;}

    .btn{
      cursor:pointer;
      padding:10px 14px;
      border-radius:18px;
      transition:.15s;
    }
    .btn:disabled{opacity:.55; cursor:not-allowed}

    .add-grid{margin-top:12px; display:grid; gap:10px; grid-template-columns: 1.4fr .6fr .6fr .6fr .2fr;}
    @media (max-width:980px){ .add-grid{grid-template-columns:1fr 1fr;} .btn-green{width:100%} }

    .radar-wrap{
      margin-top:10px; width:100%;
      border-radius:18px;
      overflow:hidden; display:flex; justify-content:center; align-items:center;
      padding:8px;
    }
    .radar-wrap canvas{max-width:100%; height:auto}

    .mini-stats{margin-top:10px; display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
    .mini{border-radius:18px; padding:10px;}
    .mini-v{font-family:var(--font-display); font-size:20px;}
    .mini-v span{font-size:12px;}
    .mini-l{margin-top:4px; font-size:11px;}

    .note{
      margin-top:10px; border-radius:18px;
      padding:10px;
      font-size:13px; line-height:1.65;
    }

    .chart-wrap{
      margin-top:10px; width:100%;
      border-radius:18px;
      overflow:hidden;
      padding:10px;
    }
    .chart-wrap canvas{width:100%; height:auto; display:block}

    .footer{
      margin-top:18px; padding-top:14px;
      font-size:12px;
      display:flex; flex-direction:column; gap:6px;
    }

    .countdown{
      margin-top:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:18px;
    }

    .shame-panel{
      margin-top:12px;
      border-radius:18px;
      padding:12px;
    }
    .shame-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .shame-title{
      font-size:11px;
      letter-spacing:2px;
    }
    .shame-value{
      font-family:var(--font-display);
      font-size:28px;
      min-width:72px;
      text-align:center;
      margin-inline-start:auto;
      padding-inline-start:10px;
    }
    .shame-sub{
      margin-top:6px;
      font-size:12px;
    }

    .manual-layout{
      margin-top:22px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    @media (max-width:980px){
      .manual-layout{grid-template-columns:1fr}
    }

    .manual-list{
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .manual-step{
      border-radius:18px;
      padding:12px;
    }

    .manual-step-title{
      font-family:var(--font-display);
      font-size:15px;
      margin-bottom:6px;
    }

    .manual-step-text{
      font-size:13px;
      line-height:1.75;
    }

    .manual-highlight{
      border-radius:20px;
      padding:14px;
      margin-top:12px;
      line-height:1.8;
      font-size:13px;
    }

    .manual-warning{
      border-radius:20px;
      padding:14px;
      margin-top:12px;
      line-height:1.8;
      font-size:13px;
    }

    .manual-grid{
      margin-top:12px;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }
    @media (max-width:700px){
      .manual-grid{grid-template-columns:1fr}
    }

    .export-card{
      margin-top:14px;
      border-radius:20px;
      padding:14px;
      transition: all 0.2s ease;
    }
    .export-header{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
      padding-bottom:10px;
    }
    .export-icon{
      font-size:24px;
    }
    .export-title{
      font-family:var(--font-display);
      font-size:16px;
      letter-spacing:1px;
    }
    .export-buttons{
      display:flex;
      gap:12px;
      margin:12px 0 8px;
      flex-wrap:wrap;
    }
    .export-btn{
      flex:1;
      text-align:center;
      cursor:pointer;
      padding:10px 12px;
      border-radius:16px;
      font-size:13px;
      transition:.2s;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .export-info{
      margin-top:12px;
      padding:8px 10px;
      border-radius:14px;
      font-size:11px;
      line-height:1.6;
      text-align:center;
    }
  </style>
</head>

<body>
  <div class="theme-switcher">
    <button class="theme-btn theme1 active" onclick="switchTheme(1)">🌌 THEME 1 (Cosmic)</button>
    <button class="theme-btn theme2" onclick="switchTheme(2)">🔥 THEME 2 (Ember)</button>
  </div>
  <div id="bg-anim" class="bg-anim"></div>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    // ========== تعريف الثيمات ==========
    const THEME1_STYLE = `
      :root{
        --background: 235 35% 6%;
        --foreground: 210 40% 96%;
        --chart-1: 195 100% 55%;
        --chart-2: 280 85% 64%;
        --chart-3: 155 80% 48%;
        --chart-4: 35 95% 58%;
        --chart-5: 0 84% 60%;
        --card-bg: rgba(0,0,0,0.20);
        --border-color: rgba(255,255,255,0.14);
        --glitch-color-1: hsl(195 100% 55%);
        --glitch-color-2: hsl(0 84% 60%);
        --radar-color: rgba(0,229,255,0.88);
        --radar-fill: rgba(0,229,255,0.20);
        --chart-color: rgba(0,229,255,0.92);
        --chart-fill: rgba(0,229,255,0.10);
        --exp-chart-color: rgba(168,85,247,0.92);
        --exp-chart-fill: rgba(168,85,247,0.10);
        --s-rank-glow: rgba(0,229,255,0.5);
        --s-rank-bg: rgba(0,229,255,0.12);
        --s-rank-border: rgba(0,229,255,0.35);
        --s-rank-text: hsl(195 100% 65%);
      }
      body{
        background: hsl(var(--background));
        color: hsl(var(--foreground));
      }
      .bg-anim{
        position:fixed;
        inset:-18%;
        z-index:-2;
        background: radial-gradient(1200px 900px at 20% 25%, hsl(var(--chart-2) / 0.22), transparent 60%),
                    radial-gradient(1100px 850px at 80% 30%, hsl(var(--chart-1) / 0.22), transparent 62%),
                    radial-gradient(1000px 800px at 25% 85%, hsl(var(--chart-3) / 0.18), transparent 60%),
                    radial-gradient(900px 700px at 85% 80%, hsl(var(--chart-4) / 0.10), transparent 62%),
                    linear-gradient(to bottom, hsl(235 35% 6%), hsl(240 32% 7%));
        background-size: 140% 140%;
        animation: spaceDrift 18s ease-in-out infinite;
        transform: translateZ(0);
      }
      .bg-anim::before{
        content:"";
        position:absolute; inset:0;
        background: conic-gradient(from 210deg at 50% 50%, transparent 0deg, hsl(var(--chart-1) / 0.07) 70deg, transparent 140deg, hsl(var(--chart-2) / 0.07) 220deg, transparent 360deg);
        filter: blur(20px);
        animation: nebulaSpin 28s linear infinite;
        mix-blend-mode: screen;
      }
      .bg-anim::after{
        content:"";
        position:absolute; inset:0;
        background: radial-gradient(circle at 10% 20%, rgba(255,255,255,.12) 0 1px, transparent 2px),
                    radial-gradient(circle at 35% 40%, rgba(255,255,255,.10) 0 1px, transparent 2px),
                    radial-gradient(circle at 70% 25%, rgba(255,255,255,.12) 0 1px, transparent 2px),
                    radial-gradient(circle at 85% 55%, rgba(255,255,255,.10) 0 1px, transparent 2px),
                    radial-gradient(circle at 20% 80%, rgba(255,255,255,.10) 0 1px, transparent 2px),
                    radial-gradient(circle at 55% 78%, rgba(255,255,255,.08) 0 1px, transparent 2px);
        animation: starsFloat 14s ease-in-out infinite;
      }
      @keyframes spaceDrift{
        0%   { background-position: 45% 55%; transform: scale(1); filter: hue-rotate(0deg); }
        50%  { background-position: 60% 40%; transform: scale(1.03); filter: hue-rotate(10deg); }
        100% { background-position: 45% 55%; transform: scale(1); filter: hue-rotate(0deg); }
      }
      @keyframes nebulaSpin{ from{ transform: rotate(0deg); } to{ transform: rotate(360deg); } }
      @keyframes starsFloat{
        0%   { transform: translate(0px,0px); opacity:.50; }
        50%  { transform: translate(14px,-10px); opacity:.60; }
        100% { transform: translate(0px,0px); opacity:.50; }
      }
      .hero-glow{
        background: radial-gradient(circle at center, hsl(var(--chart-1) / 0.28), transparent 62%);
        filter: blur(22px);
        opacity:.9;
      }
      .badge{
        border:1px solid var(--border-color);
        background: rgba(0,0,0,.18);
        color: rgba(255,255,255,.92);
      }
      .dot{ background:hsl(var(--chart-1)); box-shadow: 0 0 18px hsl(var(--chart-1) / .60);}
      .brand-name{ color: inherit; }
      .brand-sub{ color:rgba(255,255,255,.60); }
      .subtitle{ color:rgba(255,255,255,.78); }
      .glitch-word{ color: hsl(var(--foreground)); text-shadow: 0 0 8px rgba(255,255,255,.08), 0 0 18px hsl(var(--chart-1) / .16); }
      .glitch-word::before{ color: hsl(var(--chart-1)); }
      .glitch-word::after{ color: hsl(var(--chart-5)); }
      .glitch-word.self-word{ text-shadow: 0 0 10px rgba(255,255,255,.10), 0 0 20px hsl(var(--chart-2) / .22), 0 0 28px hsl(var(--chart-5) / .16); }
      .glitch-word.self-word::before{ color: hsl(var(--chart-2)); }
      .glitch-word.self-word::after{ color: hsl(var(--chart-5)); }
      .chip{ border:1px solid var(--border-color); background: rgba(0,0,0,.18); color: rgba(255,255,255,.82); }
      .chip-mono{ color: rgba(255,255,255,.92); }
      .nav-btn{ border:1px solid var(--border-color); background: rgba(255,255,255,.06); color: rgba(255,255,255,.96); }
      .nav-btn:hover{ background: rgba(255,255,255,.10); }
      .nav-btn.active{ border-color:hsl(var(--chart-1)/.35); background:hsl(var(--chart-1)/.16); box-shadow:0 0 18px hsl(var(--chart-1)/.18); }
      .stat{ border:1px solid var(--border-color); background: rgba(0,0,0,.20); }
      .stat-k{ color: rgba(255,255,255,.72); }
      .stat-hp{ border-color:hsl(var(--chart-3) / .35); background:hsl(var(--chart-3) / .12); }
      .stat-level{ border-color:hsl(var(--chart-1) / .35); background:hsl(var(--chart-1) / .12); }
      .stat-rank{ border-color:hsl(var(--chart-2) / .35); background:hsl(var(--chart-2) / .12); }
      .stat-rank-special{ border-color:hsl(195 100% 55% / .5) !important; background: linear-gradient(135deg, rgba(0,100,120,0.6) 0%, rgba(0,50,70,0.5) 100%) !important; box-shadow: 0 0 25px rgba(0,229,255,0.3) !important; }
      .stat-rank-special .stat-v{ color: hsl(195 100% 65%); text-shadow: 0 0 15px rgba(0,229,255,0.5); animation: sRankPulse 2s ease-in-out infinite; }
      @keyframes sRankPulse{ 0%,100%{ text-shadow:0 0 10px rgba(0,229,255,0.5); } 50%{ text-shadow:0 0 25px rgba(0,229,255,0.9); } }
      .locked{ border:1px solid hsl(var(--chart-5) / .35); background:hsl(var(--chart-5) / .12); }
      .card{ border:1px solid var(--border-color); background: var(--card-bg); }
      .label{ color: rgba(255,255,255,.70); }
      .muted{ color: rgba(255,255,255,.70); }
      .tiny{ color: rgba(255,255,255,.64); }
      .quote{ color: rgba(255,255,255,.95); }
      .bar{ background: rgba(255,255,255,.12); }
      .fill{ background:hsl(var(--chart-1)); box-shadow: 0 0 18px hsl(var(--chart-1)/.35); }
      .task{ border:1px solid var(--border-color); background: rgba(255,255,255,.04); }

    function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

    function randomQuote(seed){
      let hh = 0;

    function expToLevel(totalExp){
      const a = 120;
      let level = 1;
      let expForNext = a;
      let remaining = totalExp;
      while(remaining >= expForNext){
        remaining -= expForNext;
        level += 1;
        expForNext = Math.round(a * Math.pow(level, 1.15));
        if(level > 200) break;
      }
      return { level, expIntoLevel: remaining, expForNext };

      const hh = Math.floor(s/3600);
      const mm = Math.floor((s%3600)/60);
      const ss = s%60;
      return `${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
    }

    function parseKey(key){
      const [y,m,d] = String(key).split("-").map(Number);
      const dt = new Date(y, (m||1)-1, d||1);
      dt.setHours(12,0,0,0);
      return dt;

      const y = dt.getFullYear();
      const m = String(dt.getMonth()+1).padStart(2,"0");

      return `${y}-${m}-${d}`;

      const a = parseKey(aKey).getTime();

      return Math.round(220 + 18 * Math.log2(level + 1) + 0.8 * Math.sqrt(level));

    function penaltyRatioByLevel(level){
      return clamp(0.95 + (Math.max(1, level) - 1) * 0.03, 0.95, 2.20);
    }
    function expPenaltyByLevel(level){
      const dailyMax = dailyMaxExpByLevel(level);
      return Math.round(dailyMax * penaltyRatioByLevel(level));

    function computeToday(tasks, level){
      const totals = {
        scoreDone: 0,
        scoreTotal: 0,
        completion: 0,
        exp: 0,
        expMax: 0,
        weightedProgress: 0,
        byType: {PH:0, IQ:0, SP:0},
        byTypePotential: {PH:0, IQ:0, SP:0},
        xxTriggered: false,
      };
      const SCORE_UNIT = 10;

      for(const t of tasks){
        const importance = Number(t.importance || 1);
        const weight = importance * SCORE_UNIT;
        const target = Math.max(1, Number(t.target || 1));
        const done = clamp(Number(t.done || 0), 0, target);
        const ratio = target > 0 ? (done / target) : 0;

        if(t.type === "XX"){
          if(done > 0) totals.xxTriggered = true;
          continue;
        }

        totals.scoreTotal += weight;
        totals.scoreDone += weight * ratio;
        totals.byType[t.type] += weight * ratio;
        totals.byTypePotential[t.type] += weight;
      }

      totals.completion = totals.scoreTotal > 0 ? (totals.scoreDone / totals.scoreTotal) : 0;

      if(totals.xxTriggered){
        totals.completion = Math.max(0, totals.completion - 0.5);
      }

      const dailyMax = dailyMaxExpByLevel(level);
      totals.expMax = dailyMax;
      totals.weightedProgress = totals.completion;
      totals.exp = Math.round(totals.weightedProgress * dailyMax);

      return totals;
    }

        const y = cy + Math.sin(a)*r;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);

        const radius = Math.min(w, hh) * 0.33;

        ctx.save();
        ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--border-color') || "rgba(255,255,255,0.12)";
        ctx.lineWidth = 1;

        for(let r=1;r<=4;r++){
          polygon(ctx, cx, cy, radius*(r/4), 3, -Math.PI/2);
          ctx.stroke();
        }

        const labels = ["PH","IQ","SP"];
        const angles = [
          -Math.PI/2,
          -Math.PI/2 + (2*Math.PI/3),
          -Math.PI/2 + (4*Math.PI/3),
        ];

        labels.forEach((lab,i)=>{
          const a = angles[i];
          const x = cx + Math.cos(a)*radius;
          const y = cy + Math.sin(a)*radius;
          ctx.beginPath();
          ctx.moveTo(cx,cy);
          ctx.lineTo(x,y);
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.78)";
          ctx.font = "16px IBM Plex Sans Arabic, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(lab, cx + Math.cos(a)*(radius+26), cy + Math.sin(a)*(radius+18));
        });

        const pPH = (vals.PH||0)/100, pIQ = (vals.IQ||0)/100, pSP = (vals.SP||0)/100;
        const arr = [pPH,pIQ,pSP].map((v,i)=>{
          const a = angles[i];
          return { x: cx + Math.cos(a)*radius*v, y: cy + Math.sin(a)*radius*v };
        });

        ctx.beginPath();
        ctx.moveTo(arr[0].x, arr[0].y);
        ctx.lineTo(arr[1].x, arr[1].y);
        ctx.lineTo(arr[2].x, arr[2].y);
        ctx.closePath();

        ctx.fillStyle = "rgba(0,229,255,0.20)";
        ctx.fill();
        ctx.strokeStyle = "rgba(0,229,255,0.88)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = "rgba(0,229,255,0.95)";
        arr.forEach(p=>{
          ctx.beginPath();
          ctx.arc(p.x,p.y,4,0,Math.PI*2);
          ctx.fill();
        });

        ctx.restore();
      }

      useEffect(()=>{
        const next = props.values || {PH:0, IQ:0, SP:0};
        const from = prevRef.current;

        if(animRef.current) cancelAnimationFrame(animRef.current);

        const start = performance.now();
        const dur = 320;
        function lerp(a,b,t){ return a + (b-a)*t; }
        function ease(t){ return 1 - Math.pow(1-t, 3); }

        function step(now){
          const t = Math.min(1, (now - start) / dur);
          const k = ease(t);
          const cur = {
            PH: lerp(from.PH, next.PH, k),
            IQ: lerp(from.IQ, next.IQ, k),
            SP: lerp(from.SP, next.SP, k),
          };
          draw(cur);
          if(t < 1) animRef.current = requestAnimationFrame(step);
          else prevRef.current = {PH: next.PH, IQ: next.IQ, SP: next.SP};
        }
        animRef.current = requestAnimationFrame(step);

        return ()=> { if(animRef.current) cancelAnimationFrame(animRef.current); };
      }, [props.values]);

      return h("div", {className:"radar-wrap"},
        h("canvas", {ref, width:520, height:420})
      );
    }

    function CommitChart(props){
      const ref = useRef(null);
      const prevYRef = useRef(null);
      const animRef = useRef(null);

      function draw(points, t=1){
        const canvas = ref.current;
        if(!canvas) return;
        const ctx = canvas.getContext("2d");
        const w = canvas.width, hh = canvas.height;
        ctx.clearRect(0,0,w,hh);

        const pad = 18;
        const innerW = w - pad*2;
        const innerH = hh - pad*2;

        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.lineWidth = 1;
        for(let i=0;i<=4;i++){
          const y = pad + (innerH * (i/4));
          ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(w-pad, y); ctx.stroke();
        }
        ctx.restore();

        if(!points || points.length < 2){
          ctx.fillStyle = "rgba(255,255,255,0.70)";
          ctx.font = "13px IBM Plex Sans Arabic, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("سيظهر المنحنى بعد أول يوم حفظ تلقائي.", w/2, hh/2);
          return;
        }

        const maxY = Math.max(1, ...points.map(p=>p.y));
        const minY = Math.min(...points.map(p=>p.y));
        const range = Math.max(1, maxY - minY);

        const xs = points.map((p, i)=>{
          const x = pad + (innerW * (i/(points.length-1)));
          const yNorm = (p.y - minY) / range;
          const y = pad + innerH - (yNorm * innerH);
          return {x,y, yVal:p.y};
        });

        const prev = prevYRef.current;
        const ys = xs.map((p,i)=>{
          const py = prev && prev[i] != null ? prev[i] : p.y;
          return { x:p.x, y: py + (p.y - py)*t, yVal:p.yVal };
        });

        ctx.beginPath();
        ctx.moveTo(ys[0].x, ys[0].y);
        for(let i=1;i<ys.length;i++) ctx.lineTo(ys[i].x, ys[i].y);
        ctx.lineTo(ys[ys.length-1].x, hh-pad);
        ctx.lineTo(ys[0].x, hh-pad);
        ctx.closePath();
        ctx.fillStyle = "rgba(0,229,255,0.10)";
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(ys[0].x, ys[0].y);
        for(let i=1;i<ys.length;i++) ctx.lineTo(ys[i].x, ys[i].y);
        ctx.strokeStyle = "rgba(0,229,255,0.92)";
        ctx.lineWidth = 2.2;
        ctx.stroke();

        ctx.fillStyle = "rgba(0,229,255,0.95)";
        for(const p of ys){
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3.6, 0, Math.PI*2);
          ctx.fill();
        }

        ctx.fillStyle = "rgba(255,255,255,0.70)";
        ctx.font = "12px IBM Plex Sans Arabic, sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(`الآن: ${points[points.length-1].y} يوم`, w-pad, pad+12);
        ctx.textAlign = "left";
        ctx.fillText(`البداية: ${points[0].y} يوم`, pad, pad+12);

        prevYRef.current = xs.map(p=>p.y);
      }

      useEffect(()=>{
        const points = props.points || [];
        if(animRef.current) cancelAnimationFrame(animRef.current);

        const start = performance.now();
        const dur = 420;
        function ease(t){ return 1 - Math.pow(1-t, 3); }

        function step(now){
          const tt = Math.min(1, (now - start) / dur);
          draw(points, ease(tt));
          if(tt < 1) animRef.current = requestAnimationFrame(step);
        }
        animRef.current = requestAnimationFrame(step);

        return ()=>{ if(animRef.current) cancelAnimationFrame(animRef.current); };
      }, [props.points]);

      return h("div", {className:"chart-wrap"},
        h("canvas", {ref, width:720, height:280})
      );
    }

    function ExpChart(props){
      const ref = useRef(null);
      const animRef = useRef(null);

      function draw(points, t=1){
        const canvas = ref.current;
        if(!canvas) return;
        const ctx = canvas.getContext("2d");
        const w = canvas.width, hh = canvas.height;
        ctx.clearRect(0,0,w,hh);

        const pad = 18;
        const innerW = w - pad*2;
        const innerH = hh - pad*2;

        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.lineWidth = 1;
        for(let i=0;i<=4;i++){
          const y = pad + (innerH * (i/4));
          ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(w-pad, y); ctx.stroke();
        }
        ctx.restore();

        if(!points || points.length < 2){
          ctx.fillStyle = "rgba(255,255,255,0.70)";
          ctx.font = "13px IBM Plex Sans Arabic, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("سيظهر منحنى EXP بعد أول يوم حفظ تلقائي.", w/2, hh/2);
          return;
        }

        const maxY = Math.max(1, ...points.map(p=>p.y));
        const minY = Math.min(...points.map(p=>p.y));
        const range = Math.max(1, maxY - minY);

        const pts = points.map((p,i)=>{
          const x = pad + (innerW * (i/(points.length-1)));
          const yNorm = (p.y - minY) / range;
          const y = pad + innerH - (yNorm * innerH);
          return {x,y, yVal:p.y};
        });

        const shown = pts.map(p=>({x:p.x, y: pad + innerH - ((pad + innerH - p.y) * t), yVal:p.yVal}));

        ctx.beginPath();
        ctx.moveTo(shown[0].x, shown[0].y);
        for(let i=1;i<shown.length;i++) ctx.lineTo(shown[i].x, shown[i].y);
        ctx.lineTo(shown[shown.length-1].x, hh-pad);
        ctx.lineTo(shown[0].x, hh-pad);
        ctx.closePath();
        ctx.fillStyle = "rgba(168,85,247,0.10)";
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(shown[0].x, shown[0].y);
        for(let i=1;i<shown.length;i++) ctx.lineTo(shown[i].x, shown[i].y);
        ctx.strokeStyle = "rgba(168,85,247,0.92)";
        ctx.lineWidth = 2.2;
        ctx.stroke();

        ctx.fillStyle = "rgba(168,85,247,0.95)";
        for(const p of shown){
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3.6, 0, Math.PI*2);
          ctx.fill();
        }

        ctx.fillStyle = "rgba(255,255,255,0.70)";
        ctx.font = "12px IBM Plex Sans Arabic, sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(`Net EXP الآن: ${Math.round(points[points.length-1].y)}`, w-pad, pad+12);
      }

      useEffect(()=>{
        const points = props.points || [];
        if(animRef.current) cancelAnimationFrame(animRef.current);

        const start = performance.now();
        const dur = 420;
        function ease(t){ return 1 - Math.pow(1-t, 3); }

        function step(now){
          const tt = Math.min(1, (now - start) / dur);
          draw(points, ease(tt));
          if(tt < 1) animRef.current = requestAnimationFrame(step);
        }
        animRef.current = requestAnimationFrame(step);

        return ()=>{ if(animRef.current) cancelAnimationFrame(animRef.current); };
      }, [props.points]);

      return h("div", {className:"chart-wrap"},
        h("canvas", {ref, width:720, height:280})
      );
    }

    function compressForExport(state) {
      const exportData = {
        v: 2,
        exportDate: new Date().toISOString(),
        day: state.day,
        exp: Math.round(state.totalExp),
        hp: state.hp,
        commit: state.commitDays,
        shame: state.shameDays,
        perfect: state.perfectStreak,
        lastCommit: state.lastCommitDay,
        lifetime: state.lifetimeByType,
        lifetimePot: state.lifetimePotentialByType,
        tasks: state.tasks.map(t => ({
          t: t.title,
          tg: t.target,
          imp: t.importance,
          tp: t.type
        })),
        history: {
          commit: state.commitHistory,
          exp: state.expHistory
        }
      };
      return JSON.stringify(exportData, null, 2);
    }
    
    function decompressFromExport(compressed) {
      try {
        const data = JSON.parse(compressed);
        if (data.v === 2) {
          return {
            day: data.day,
            totalExp: data.exp,
            hp: data.hp,
            commitDays: data.commit,
            shameDays: data.shame,
            perfectStreak: data.perfect,
            lastCommitDay: data.lastCommit,
            lifetimeByType: data.lifetime || { PH:0, IQ:0, SP:0 },
            lifetimePotentialByType: data.lifetimePot || { PH:0, IQ:0, SP:0 },
            tasks: (data.tasks || []).map(t => ({
              id: `t${Math.random().toString(16).slice(2)}`,
              title: t.t,
              target: t.tg,
              importance: t.imp,
              type: t.tp,
              done: 0
            })),
            commitHistory: data.history?.commit || [],
            expHistory: data.history?.exp || [],
            lockedUntil: null,
            zeroLockUsed: true
          };
        }
        return null;
      } catch(e) {
        return null;
      }
    }
    
    function exportData(state) {
      const compressed = compressForExport(state);
      const blob = new Blob([compressed], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `rise_backup_${state.day}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      alert('✅ تم تصدير النسخة الاحتياطية بنجاح');
    }
    
    function importData(setStateCallback) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'application/json';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const restored = decompressFromExport(event.target.result);
            if (restored) {
              setStateCallback(restored);
              saveState(restored);
              alert('✅ تم استعادة التقدم بنجاح! سيتم تحديث الصفحة.');
              setTimeout(() => window.location.reload(), 500);
            } else {
              alert('❌ الملف غير صالح أو تالف');
            }
          } catch(err) {
            alert('❌ خطأ في قراءة الملف');
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function App(){
      const loaded = useMemo(()=>loadState(), []);
      const [page, setPage] = useState("dashboard");
      
      const [state, setState] = useState(()=>{
        const base = {
          day: todayKeyLocal(),
          tasks: [
            { id:"t1", title:"صلاة", target:5, importance:5, type:"SP", done:0 },
            { id:"t2", title:"Push-ups", target:300, importance:4, type:"PH", done:0 },
            { id:"t3", title:"قراءة", target:30, importance:3, type:"IQ", done:0 },
          ],
          totalExp: 0,
          hp: 100,
          commitDays: 0,
          shameDays: 0,
          perfectStreak: 0,
          lastCommitDay: null,
          lockedUntil: null,
          zeroLockUsed: true,
          lifetimeByType: { PH:0, IQ:0, SP:0 },
          lifetimePotentialByType: { PH:0, IQ:0, SP:0 },
          commitHistory: [],
          expHistory: [],
        };
        if(loaded && typeof loaded === "object") return Object.assign({}, base, loaded);
        return base;
      });

      const [countdownMs, setCountdownMs] = useState(msToMidnight());
      const [glitchIndex, setGlitchIndex] = useState(1);

      useEffect(()=>{ saveState(state); }, [state]);

      useEffect(()=>{
        const t = setInterval(()=> setCountdownMs(msToMidnight()), 1000);
        return ()=>clearInterval(t);
      }, []);

      useEffect(()=>{
        const iv = setInterval(()=>{
          setGlitchIndex(prev => (prev + 1) % GLITCH_WORDS.length);
        }, 1800);
        return ()=>clearInterval(iv);
      }, []);

      const quote = useMemo(()=>randomQuote(state.day), [state.day]);
      const level = useMemo(()=>expToLevel(state.totalExp), [state.totalExp]);
      const computed = useMemo(()=>computeToday(state.tasks, level.level), [state.tasks, level.level]);
      const rank = useMemo(()=>rankFromStreak(state.commitDays), [state.commitDays]);

      const isLocked = useMemo(()=>{
        if(!state.lockedUntil) return false;
        return Date.now() < state.lockedUntil;
      }, [state.lockedUntil, countdownMs]);

      const lockRemaining = useMemo(()=>{
        if(!state.lockedUntil) return null;
        const ms = state.lockedUntil - Date.now();
        if(ms <= 0) return null;
        const hh = Math.floor(ms/(1000*60*60));
        const mm = Math.floor((ms%(1000*60*60))/(1000*60));
        return {hh, mm};
      }, [state.lockedUntil, countdownMs]);

      function updateTask(id, patch){
        setState(prev => Object.assign({}, prev, {
          tasks: prev.tasks.map(t => t.id===id ? Object.assign({}, t, patch) : t)
        }));
      }

      function removeTask(id){
        setState(prev => Object.assign({}, prev, { tasks: prev.tasks.filter(t => t.id!==id) }));
      }

      function addTask(title, target, importance, type){
        const clean = String(title||"").trim();
        if(!clean) return;
        setState(prev => Object.assign({}, prev, {
          tasks: prev.tasks.concat([{
            id:`t${Math.random().toString(16).slice(2)}`,
            title: clean,
            target: clamp(Number(target)||1, 1, 9999),
            importance: Number(importance),
            type: type,
            done: 0
          }])
        }));
      }

      function pushHistory(history, dateKey, value){
        const arr = Array.isArray(history) ? history.slice() : [];
        if(arr.length && arr[arr.length-1].d === dateKey){
          arr[arr.length-1] = { d: dateKey, v: value };
          return arr;
        }
        arr.push({ d: dateKey, v: value });
        return arr;
      }

      function closeOneDay(prev, dayKeyToClose, totals, qualifies, completion){
        const failHard = completion < 0.5;
        const delta = qualifies ? 6 : (failHard ? -12 : -4);
        const hp = clamp(prev.hp + delta, 0, 100);

        let lockedUntil = prev.lockedUntil;
        let zeroLockUsed = (prev.zeroLockUsed === undefined) ? true : prev.zeroLockUsed;

        if(hp > 0){
          zeroLockUsed = false;
          if(lockedUntil && Date.now() >= lockedUntil) lockedUntil = null;
        }else{
          if(!zeroLockUsed){
            lockedUntil = Date.now() + 24*60*60*1000;
            zeroLockUsed = true;
          }
        }

        const currentRank = rankFromStreak(prev.commitDays).key;
        const penaltyDays = qualifies ? 0 : (RANK_PENALTY[currentRank] ?? 0);
        const commitDays = qualifies ? (prev.commitDays + 1) : Math.max(0, prev.commitDays - penaltyDays);
        const lastCommitDay = qualifies ? dayKeyToClose : prev.lastCommitDay;

        const lifetimeByType = {
          PH: prev.lifetimeByType.PH + totals.byType.PH,
          IQ: prev.lifetimeByType.IQ + totals.byType.IQ,
          SP: prev.lifetimeByType.SP + totals.byType.SP
        };
        const lifetimePotentialByType = {
          PH: prev.lifetimePotentialByType.PH + totals.byTypePotential.PH,
          IQ: prev.lifetimePotentialByType.IQ + totals.byTypePotential.IQ,
          SP: prev.lifetimePotentialByType.SP + totals.byTypePotential.SP
        };

        const currLevel = expToLevel(prev.totalExp).level;
        const expPenalty = expPenaltyByLevel(currLevel);
        const totalExp = qualifies
          ? (prev.totalExp + Math.round(totals.exp))
          : Math.max(0, prev.totalExp - expPenalty);

        let shameDays = Number(prev.shameDays || 0);
        let perfectStreak = Number(prev.perfectStreak || 0);

        if(completion <= 0){
          shameDays += 1;
          perfectStreak = 0;
        }else if(completion >= 1){
          perfectStreak += 1;
          if(perfectStreak >= 10){
            const removeCount = Math.floor(perfectStreak / 10);
            shameDays = Math.max(0, shameDays - removeCount);
            perfectStreak = perfectStreak % 10;
          }
        }else{
          perfectStreak = 0;
        }

        const tasks = prev.tasks.map(t => Object.assign({}, t, {done:0}));
        const commitHistory = pushHistory(prev.commitHistory, dayKeyToClose, commitDays);
        const expHistory = pushHistory(prev.expHistory, dayKeyToClose, totalExp);

        return Object.assign({}, prev, {
          hp,
          lockedUntil,
          zeroLockUsed,
          commitDays,
          shameDays,
          perfectStreak,
          lastCommitDay,
          lifetimeByType,
          lifetimePotentialByType,
          totalExp,
          tasks,
          commitHistory,
          expHistory
        });
      }

      function finalizeDayNoMercy(){
        setState(prev=>{
          const today = todayKeyLocal();
          if(prev.day === today) return prev;

          const gap = diffDaysKey(prev.day, today);
          if(gap <= 0) return Object.assign({}, prev, { day: today });

          const MAX_CATCHUP = 90;
          const safeGap = Math.min(gap, MAX_CATCHUP);

          let s = Object.assign({}, prev);

          {
            const currLevel = expToLevel(s.totalExp).level;
            const totals = computeToday(s.tasks, currLevel);
            const completion = totals.completion;
            const qualifies = completion >= 0.7;
            s = closeOneDay(s, s.day, totals, qualifies, completion);
          }

          for(let i=1;i<safeGap;i++){
            const dayKey = addDaysKey(prev.day, i);
            const currLevel = expToLevel(s.totalExp).level;
            const totals = computeToday(s.tasks, currLevel);
            const completion = 0;
            const qualifies = false;
            s = closeOneDay(s, dayKey, totals, qualifies, completion);
          }

          s.day = today;
          return s;
        });
      }

      const finalizeRef = useRef(finalizeDayNoMercy);
      useEffect(()=>{ finalizeRef.current = finalizeDayNoMercy; });

      useEffect(()=>{
        let to = null;
        function scheduleMidnight(){
          if(to) clearTimeout(to);
          const ms = msToMidnight();
          to = setTimeout(()=>{
            finalizeRef.current();
            scheduleMidnight();
          }, ms + 120);
        }
        scheduleMidnight();

        const iv = setInterval(()=>{
          if(todayKeyLocal() !== state.day){
            finalizeRef.current();
          }
        }, 20000);

        function onVis(){
          if(document.visibilityState === "visible"){
            if(todayKeyLocal() !== state.day){
              finalizeRef.current();
            }
          }
        }
        function onFocus(){
          if(todayKeyLocal() !== state.day){
            finalizeRef.current();
          }
        }
        document.addEventListener("visibilitychange", onVis);
        window.addEventListener("focus", onFocus);

        if(todayKeyLocal() !== state.day){
          finalizeRef.current();
        }

        return ()=>{
          if(to) clearTimeout(to);
          clearInterval(iv);
          document.removeEventListener("visibilitychange", onVis);
          window.removeEventListener("focus", onFocus);
        };
      }, [state.day]);

      const radarLive = useMemo(()=>{
        const g = state.lifetimeByType;
        const p = state.lifetimePotentialByType;
        const liveGain = { PH: g.PH + computed.byType.PH, IQ: g.IQ + computed.byType.IQ, SP: g.SP + computed.byType.SP };
        const livePot  = { PH: p.PH + computed.byTypePotential.PH, IQ: p.IQ + computed.byTypePotential.IQ, SP: p.SP + computed.byTypePotential.SP };
        const ph = livePot.PH>0 ? liveGain.PH/livePot.PH : 0;
        const iq = livePot.IQ>0 ? liveGain.IQ/livePot.IQ : 0;
        const sp = livePot.SP>0 ? liveGain.SP/livePot.SP : 0;
        return { PH: Math.round(ph*100), IQ: Math.round(iq*100), SP: Math.round(sp*100) };
      }, [state.lifetimeByType, state.lifetimePotentialByType, computed.byType, computed.byTypePotential]);

      const commitPoints = useMemo(()=>{
        const hist = Array.isArray(state.commitHistory) ? state.commitHistory : [];
        return hist.map((x,i)=>({ x:i, y:Number(x.v||0), d:x.d }));
      }, [state.commitHistory]);

      const expPoints = useMemo(()=>{
        const hist = Array.isArray(state.expHistory) ? state.expHistory : [];
        return hist.map((x,i)=>({ x:i, y:Number(x.v||0), d:x.d }));
      }, [state.expHistory]);

      const [newTitle, setNewTitle] = useState("");
      const [newTarget, setNewTarget] = useState(10);
      const [newImportance, setNewImportance] = useState(3);
      const [newType, setNewType] = useState("PH");

      const expPenaltyPreview = useMemo(()=>expPenaltyByLevel(level.level), [level.level]);
      const currentWord = GLITCH_WORDS[glitchIndex];
      const isSelfWord = currentWord === "نفسك";

      const handleExport = () => {
        exportData(state);
      };

      const handleImport = () => {
        importData((restoredState) => {
          setState(restoredState);
        });
      };

      return h("div", {className:"wrap"},
        h("header", {className:"header"},
          h("div", {className:"hero-glow"}),
          h("div", {className:"top-row"},
            h("div", null,
              h("div", {className:"badge"},
                h("span", {className:"dot"}),
                h("span", {className:"brand-name"}, "RISE SYSTEM™"),
                h("span", {className:"brand-sub"}, "No-Mercy Mode")
              ),
              h("h1", {className:"title"},
                "طوّر شخصيتك… مثل ",
                h("span", {
                  className:`glitch-word ${isSelfWord ? "self-word" : ""}`,
                  "data-text": currentWord
                }, currentWord)
              ),
              h("p", {className:"subtitle"}, "لوحة التطوير اليومية مع انتقال مباشر إلى كتيب التعليمات لفهم كل القواعد والمنطق الداخلي للنظام."),

              h("div", {className:"chips"},
                h("div", {className:"chip"}, h("span", null, "اليوم:"), h("span", {className:"chip-mono"}, state.day)),
                state.lastCommitDay ? h("div", {className:"chip"}, h("span", null, "آخر يوم محسوب:"), h("span", {className:"chip-mono"}, state.lastCommitDay)) : null
              ),

              h("div", {className:"header-actions"},
                h("button", {
                  className:`nav-btn ${page==="dashboard" ? "active" : ""}`,
                  onClick:()=>setPage("dashboard")
                }, "لوحة النظام"),
                h("button", {
                  className:`nav-btn ${page==="manual" ? "active" : ""}`,
                  onClick:()=>setPage("manual")
                }, "كتيب التعليمات")
              )
            ),

            h("div", {className:"stats"},
              h("div", {className:"stat stat-hp"},
                h("div", {className:"stat-k"}, "HP"),
                h("div", {className:"stat-v"}, `${state.hp}/100`),
                h("div", {className:"stat-s"}, state.hp===0 ? "قفل 24 ساعة" : (state.hp>=70 ? "مستقر" : "خطر"))
              ),
              h("div", {className:"stat stat-level"},
                h("div", {className:"stat-k"}, "LEVEL"),
                h("div", {className:"stat-v"}, String(level.level)),
                h("div", {className:"stat-s"}, `${level.expIntoLevel}/${level.expForNext} EXP`)
              ),
              h("div", {className: rank.key === "S" ? "stat stat-rank stat-rank-special" : "stat stat-rank"},
                h("div", {className:"stat-k"}, "RANK"),
                h("div", {className:"stat-v"}, rank.label),
                h("div", {className:"stat-s"}, `${state.commitDays} يوم التزام`)
              )
            )
          )
        ),

        page === "dashboard"
          ? h(DashboardPage, {
              state, setState, level, computed, rank, isLocked, lockRemaining, countdownMs,
              quote, radarLive, commitPoints, expPoints, expPenaltyPreview,
              newTitle, setNewTitle, newTarget, setNewTarget, newImportance, setNewImportance, newType, setNewType,
              addTask, updateTask, removeTask,
              onExport: handleExport,
              onImport: handleImport
            })
          : h(ManualPage, { onExport: handleExport, onImport: handleImport }),

        h("footer", {className:"footer"},
          h("div", null, "حفظ دائم داخل المتصفح (LocalStorage)."),
          h("div", null, "RISE SYSTEM™ — No-Mercy Mode — جميع الأنواع الإيجابية متساوية الوزن")
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
