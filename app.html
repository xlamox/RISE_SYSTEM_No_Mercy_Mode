<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>RISE SYSTEM™ | No Mercy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&family=IBM+Plex+Sans+Arabic:wght@100..700&display=swap" rel="stylesheet">
  <style>
    :root{
      --background: 235 35% 6%;
      --foreground: 210 40% 96%;
      --chart-1: 195 100% 55%;
      --chart-2: 280 85% 64%;
      --chart-3: 155 80% 48%;
      --chart-4: 35 95% 58%;
      --chart-5: 0 84% 60%;
      --font-sans: "IBM Plex Sans Arabic", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --font-display: "Oxanium", "IBM Plex Sans Arabic", system-ui, sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font-sans);
      color:hsl(var(--foreground));
      background:hsl(var(--background));
      overflow-x:hidden;
    }

    .bg-anim{
      position:fixed;
      inset:-18%;
      z-index:-2;
      background:
        radial-gradient(1200px 900px at 20% 25%, hsl(var(--chart-2) / 0.22), transparent 60%),
        radial-gradient(1100px 850px at 80% 30%, hsl(var(--chart-1) / 0.22), transparent 62%),
        radial-gradient(1000px 800px at 25% 85%, hsl(var(--chart-3) / 0.18), transparent 60%),
        radial-gradient(900px 700px at 85% 80%, hsl(var(--chart-4) / 0.10), transparent 62%),
        linear-gradient(to bottom, hsl(235 35% 6%), hsl(240 32% 7%));
      background-size: 140% 140%;
      animation: spaceDrift 18s ease-in-out infinite;
      transform: translateZ(0);
      will-change: transform, filter, background-position;
    }
    .bg-anim::before{
      content:"";
      position:absolute; inset:0;
      background:
        conic-gradient(from 210deg at 50% 50%,
          transparent 0deg,
          hsl(var(--chart-1) / 0.07) 70deg,
          transparent 140deg,
          hsl(var(--chart-2) / 0.07) 220deg,
          transparent 360deg);
      filter: blur(20px);
      opacity: .95;
      animation: nebulaSpin 28s linear infinite;
      mix-blend-mode: screen;
      pointer-events:none;
    }
    .bg-anim::after{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,.12) 0 1px, transparent 2px),
        radial-gradient(circle at 35% 40%, rgba(255,255,255,.10) 0 1px, transparent 2px),
        radial-gradient(circle at 70% 25%, rgba(255,255,255,.12) 0 1px, transparent 2px),
        radial-gradient(circle at 85% 55%, rgba(255,255,255,.10) 0 1px, transparent 2px),
        radial-gradient(circle at 20% 80%, rgba(255,255,255,.10) 0 1px, transparent 2px),
        radial-gradient(circle at 55% 78%, rgba(255,255,255,.08) 0 1px, transparent 2px);
      opacity:.55;
      filter: blur(.2px);
      animation: starsFloat 14s ease-in-out infinite;
      pointer-events:none;
    }

    @keyframes spaceDrift{
      0%   { background-position: 45% 55%; transform: scale(1); filter: hue-rotate(0deg); }
      50%  { background-position: 60% 40%; transform: scale(1.03); filter: hue-rotate(10deg); }
      100% { background-position: 45% 55%; transform: scale(1); filter: hue-rotate(0deg); }
    }
    @keyframes nebulaSpin{ from{ transform: rotate(0deg); } to{ transform: rotate(360deg); } }
    @keyframes starsFloat{
      0%   { transform: translate(0px,0px); opacity:.50; }
      50%  { transform: translate(14px,-10px); opacity:.60; }
      100% { transform: translate(0px,0px); opacity:.50; }
    }

    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
    .wrap{max-width:1200px; margin:0 auto; padding:28px 16px 40px;}

    .header{position:relative}
    .hero-glow{
      position:absolute; top:-40px; left:50%; transform:translateX(-50%);
      width:760px; height:200px; border-radius:999px;
      background: radial-gradient(circle at center, hsl(var(--chart-1) / 0.28), transparent 62%);
      filter: blur(22px);
      pointer-events:none;
      opacity:.9;
    }

    .top-row{display:flex; gap:16px; align-items:flex-end; justify-content:space-between; flex-wrap:wrap;}

    .badge{
      display:inline-flex; align-items:center; gap:10px;
      padding:8px 12px; border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      font-size:12px; color: rgba(255,255,255,.92);
    }
    .dot{width:10px;height:10px;border-radius:50%; background:hsl(var(--chart-1)); box-shadow: 0 0 18px hsl(var(--chart-1) / .60);}
    .brand-name{font-family:var(--font-display); letter-spacing:.6px}
    .brand-sub{color:rgba(255,255,255,.60)}

    .title{margin:12px 0 6px; font-family:var(--font-display); font-size:40px; line-height:1.1;}
    .subtitle{margin:0; max-width:760px; color:rgba(255,255,255,.78); font-size:14.5px; line-height:1.7;}

    .glitch-word{
      position: relative;
      display: inline-block;
      color: hsl(var(--foreground));
      text-shadow:
        0 0 8px rgba(255,255,255,.08),
        0 0 18px hsl(var(--chart-1) / .16);
      animation: glitch-skew 2.6s infinite ease-in-out;
      white-space: nowrap;
    }

    .glitch-word::before,
    .glitch-word::after{
      content: attr(data-text);
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .9;
    }

    .glitch-word::before{
      color: hsl(var(--chart-1));
      transform: translate(-2px, 0);
      clip-path: inset(0 0 55% 0);
      animation: glitch-top 1.1s infinite linear alternate-reverse;
      mix-blend-mode: screen;
    }

    .glitch-word::after{
      color: hsl(var(--chart-5));
      transform: translate(2px, 0);
      clip-path: inset(45% 0 0 0);
      animation: glitch-bottom 1.35s infinite linear alternate-reverse;
      mix-blend-mode: screen;
    }

    .glitch-word.self-word{
      text-shadow:
        0 0 10px rgba(255,255,255,.10),
        0 0 20px hsl(var(--chart-2) / .22),
        0 0 28px hsl(var(--chart-5) / .16);
      animation: self-glitch-skew .9s infinite steps(2,end);
    }

    .glitch-word.self-word::before{
      color: hsl(var(--chart-2));
      transform: translate(-4px, -1px);
      clip-path: inset(0 0 62% 0);
      animation: self-glitch-top .45s infinite steps(2,end);
      opacity: .95;
    }

    .glitch-word.self-word::after{
      color: hsl(var(--chart-5));
      transform: translate(4px, 1px);
      clip-path: inset(58% 0 0 0);
      animation: self-glitch-bottom .38s infinite steps(2,end);
      opacity: .95;
    }

    @keyframes glitch-top{
      0%   { transform: translate(-2px, 0); }
      20%  { transform: translate(-3px, -1px); }
      40%  { transform: translate(-1px, 1px); }
      60%  { transform: translate(-4px, 0); }
      80%  { transform: translate(-2px, 1px); }
      100% { transform: translate(-3px, -1px); }
    }

    @keyframes glitch-bottom{
      0%   { transform: translate(2px, 0); }
      20%  { transform: translate(4px, 1px); }
      40%  { transform: translate(1px, -1px); }
      60%  { transform: translate(3px, 0); }
      80%  { transform: translate(2px, -1px); }
      100% { transform: translate(4px, 1px); }
    }

    @keyframes glitch-skew{
      0%, 100% { transform: skewX(0deg); }
      20%      { transform: skewX(-2deg); }
      21%      { transform: skewX(3deg); }
      22%      { transform: skewX(0deg); }
      65%      { transform: skewX(0deg); }
      66%      { transform: skewX(-3deg); }
      67%      { transform: skewX(2deg); }
      68%      { transform: skewX(0deg); }
    }

    @keyframes self-glitch-top{
      0%   { transform: translate(-5px,-1px); }
      25%  { transform: translate(-1px,2px); }
      50%  { transform: translate(-6px,0px); }
      75%  { transform: translate(-2px,-2px); }
      100% { transform: translate(-4px,1px); }
    }

    @keyframes self-glitch-bottom{
      0%   { transform: translate(5px,1px); }
      25%  { transform: translate(2px,-2px); }
      50%  { transform: translate(6px,0px); }
      75%  { transform: translate(3px,2px); }
      100% { transform: translate(4px,-1px); }
    }

    @keyframes self-glitch-skew{
      0%   { transform: skewX(0deg) scale(1); }
      20%  { transform: skewX(5deg) scale(1.01); }
      40%  { transform: skewX(-4deg) scale(.995); }
      60%  { transform: skewX(3deg) scale(1.01); }
      80%  { transform: skewX(-5deg) scale(.995); }
      100% { transform: skewX(0deg) scale(1); }
    }

    .chips{margin-top:12px; display:flex; flex-wrap:wrap; gap:8px;}
    .chip{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 12px; border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      font-size:12px; color: rgba(255,255,255,.82);
    }
    .chip-mono{font-family: ui-monospace, monospace; color: rgba(255,255,255,.92)}

    .header-actions{
      margin-top:16px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .nav-btn{
      cursor:pointer;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.96);
      padding:10px 14px;
      border-radius:16px;
      font-size:13px;
      transition:.15s;
    }
    .nav-btn:hover{background: rgba(255,255,255,.10)}
    .nav-btn.active{
      border-color:hsl(var(--chart-1)/.35);
      background:hsl(var(--chart-1)/.16);
      box-shadow:0 0 18px hsl(var(--chart-1)/.18);
    }

    .stats{display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; width:370px; max-width:100%;}
    .stat{
      border-radius:18px; padding:12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.20);
    }
    .stat-k{font-size:11px; letter-spacing:2px; color: rgba(255,255,255,.72)}
    .stat-v{margin-top:6px; font-family:var(--font-display); font-size:22px}
    .stat-s{margin-top:4px; font-size:11px; color: rgba(255,255,255,.66)}
    .stat-hp{border-color:hsl(var(--chart-3) / .35); background:hsl(var(--chart-3) / .12)}
    .stat-level{border-color:hsl(var(--chart-1) / .35); background:hsl(var(--chart-1) / .12)}
    .stat-rank{border-color:hsl(var(--chart-2) / .35); background:hsl(var(--chart-2) / .12)}

    .locked{
      margin-top:16px; border-radius:18px;
      border:1px solid hsl(var(--chart-5) / .35);
      background:hsl(var(--chart-5) / .12);
      padding:10px 14px;
    }
    .locked-row{display:flex; justify-content:space-between; align-items:center; gap:10px; color: rgba(255,255,255,.95); font-size:13px;}

    .main{margin-top:22px; display:grid; gap:14px; grid-template-columns:1.35fr .65fr;}
    @media (max-width:980px){ .main{grid-template-columns:1fr} }

    .card{
      border-radius:24px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.20);
      padding:14px;
    }

    .label{font-size:11px; letter-spacing:2px; color: rgba(255,255,255,.70)}
    .section-title{margin-top:6px; font-family:var(--font-display); font-size:18px}
    .muted{color: rgba(255,255,255,.70); font-size:12px}
    .tiny{display:flex; justify-content:space-between; gap:10px; color: rgba(255,255,255,.64); font-size:11px}

    .card-row{display:flex; gap:12px; align-items:flex-end; justify-content:space-between; flex-wrap:wrap;}
    .quote{margin-top:6px; font-family:var(--font-display); font-size:18px; color: rgba(255,255,255,.95);}

    .progress-row{display:flex; gap:14px; align-items:flex-end; justify-content:space-between; flex-wrap:wrap;}
    .big{margin-top:6px; font-family: var(--font-display); font-size:34px}

    .progress-side{width:280px; max-width:100%}
    .bar{width:100%; height:10px; border-radius:999px; background: rgba(255,255,255,.12); overflow:hidden;}
    .fill{height:100%; width:0%; background:hsl(var(--chart-1)); box-shadow: 0 0 18px hsl(var(--chart-1)/.35); transition: width .25s ease; }

    .task-list{margin-top:12px; display:grid; gap:10px;}
    .task{border-radius:18px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); padding:12px;}
    .task-top{display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;}

    .tag{
      display:inline-flex; align-items:center; gap:8px;
      border-radius:999px; border:1px solid rgba(255,255,255,.18);
      padding:6px 10px; font-size:11px;
    }
    .tag.ph{background:hsl(var(--chart-3)/.16); color:hsl(var(--chart-3)); border-color:hsl(var(--chart-3)/.28)}
    .tag.iq{background:hsl(var(--chart-1)/.16); color:hsl(var(--chart-1)); border-color:hsl(var(--chart-1)/.28)}
    .tag.sp{background:hsl(var(--chart-2)/.16); color:hsl(var(--chart-2)); border-color:hsl(var(--chart-2)/.28)}
    .tag.xx{background:hsl(var(--chart-5)/.16); color:hsl(var(--chart-5)); border-color:hsl(var(--chart-5)/.28)}

    .task-title{font-family:var(--font-display); font-size:15px; color: rgba(255,255,255,.96); max-width:360px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
    .task-meta{margin-top:6px; display:flex; flex-wrap:wrap; gap:10px; font-size:11px; color: rgba(255,255,255,.70)}

    .task-controls{display:flex; align-items:center; gap:8px;}
    .input{
      width:100%; padding:10px 12px; border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.96);
      outline:none;
    }
    .input:disabled{opacity:.6}
    .small{width:92px; padding:8px 10px; border-radius:14px;}

    .btn{
      cursor:pointer; border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.96);
      padding:10px 14px;
      border-radius:18px;
      transition:.15s;
    }
    .btn:hover{background: rgba(255,255,255,.10)}
    .btn:disabled{opacity:.55; cursor:not-allowed}
    .btn-green{
      width:44px; padding:10px 0;
      border-color:hsl(var(--chart-3)/.30);
      background:hsl(var(--chart-3)/.18);
    }
    .btn-green:hover{background:hsl(var(--chart-3)/.24)}

    .add-grid{margin-top:12px; display:grid; gap:10px; grid-template-columns: 1.4fr .6fr .6fr .6fr .2fr;}
    @media (max-width:980px){ .add-grid{grid-template-columns:1fr 1fr;} .btn-green{width:100%} }

    .radar-wrap{
      margin-top:10px; width:100%;
      border-radius:18px; border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      overflow:hidden; display:flex; justify-content:center; align-items:center;
      padding:8px;
    }
    .radar-wrap canvas{max-width:100%; height:auto}

    .mini-stats{margin-top:10px; display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
    .mini{border-radius:18px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); padding:10px;}
    .mini-v{font-family:var(--font-display); font-size:20px;}
    .mini-v span{font-size:12px; color: rgba(255,255,255,.55)}
    .mini-l{margin-top:4px; font-size:11px; color: rgba(255,255,255,.68)}

    .note{
      margin-top:10px; border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      padding:10px;
      color: rgba(255,255,255,.78);
      font-size:13px; line-height:1.65;
    }

    .chart-wrap{
      margin-top:10px; width:100%;
      border-radius:18px; border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      overflow:hidden;
      padding:10px;
    }
    .chart-wrap canvas{width:100%; height:auto; display:block}

    .footer{
      margin-top:18px; padding-top:14px;
      border-top:1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.70);
      font-size:12px;
      display:flex; flex-direction:column; gap:6px;
    }

    .countdown{
      margin-top:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
    }

    .shame-panel{
      margin-top:12px;
      border-radius:18px;
      border:1px solid hsl(var(--chart-5) / .35);
      background:hsl(var(--chart-5) / .12);
      padding:12px;
    }
    .shame-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .shame-title{
      font-size:11px;
      letter-spacing:2px;
      color: rgba(255,255,255,.75);
    }
    .shame-value{
      font-family:var(--font-display);
      font-size:28px;
      color:hsl(var(--chart-5));
      text-shadow:0 0 16px hsl(var(--chart-5) / .30);
      min-width:72px;
      text-align:center;
      margin-inline-start:auto;
      padding-inline-start:10px;
    }
    .shame-sub{
      margin-top:6px;
      font-size:12px;
      color: rgba(255,255,255,.72);
    }

    .manual-layout{
      margin-top:22px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    @media (max-width:980px){
      .manual-layout{grid-template-columns:1fr}
    }

    .manual-list{
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .manual-step{
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      padding:12px;
    }

    .manual-step-title{
      font-family:var(--font-display);
      font-size:15px;
      margin-bottom:6px;
      color:rgba(255,255,255,.96);
    }

    .manual-step-text{
      color:rgba(255,255,255,.76);
      font-size:13px;
      line-height:1.75;
    }

    .manual-highlight{
      border-radius:20px;
      border:1px solid hsl(var(--chart-1)/.30);
      background:hsl(var(--chart-1)/.10);
      padding:14px;
      margin-top:12px;
      color:rgba(255,255,255,.88);
      line-height:1.8;
      font-size:13px;
    }

    .manual-warning{
      border-radius:20px;
      border:1px solid hsl(var(--chart-5)/.34);
      background:hsl(var(--chart-5)/.12);
      padding:14px;
      margin-top:12px;
      color:rgba(255,255,255,.88);
      line-height:1.8;
      font-size:13px;
    }

    .manual-grid{
      margin-top:12px;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }
    @media (max-width:700px){
      .manual-grid{grid-template-columns:1fr}
    }

    /* login form (only login) */
    .login-container{
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card{
      max-width: 420px;
      width: 100%;
      border-radius: 36px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      padding: 32px 28px;
      text-align: center;
      box-shadow: 0 25px 45px rgba(0,0,0,.5);
    }
    .login-title{
      font-family: var(--font-display);
      font-size: 32px;
      margin-bottom: 8px;
    }
    .login-sub{
      color: rgba(255,255,255,.7);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .login-input{
      width: 100%;
      margin-bottom: 18px;
      padding: 14px 18px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.05);
      color: white;
      font-size: 15px;
      outline: none;
      transition: .2s;
    }
    .login-input:focus{
      border-color: hsl(var(--chart-1)/.6);
      background: rgba(255,255,255,.08);
    }
    .login-btn{
      width: 100%;
      padding: 12px;
      border-radius: 40px;
      background: hsl(var(--chart-1)/.2);
      border: 1px solid hsl(var(--chart-1)/.5);
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: .2s;
      font-family: var(--font-display);
    }
    .login-btn:hover{
      background: hsl(var(--chart-1)/.4);
      box-shadow: 0 0 14px hsl(var(--chart-1)/.3);
    }
    .login-error{
      color: hsl(var(--chart-5));
      margin-top: 12px;
      font-size: 13px;
    }
    .loading{
      text-align: center;
      padding: 40px;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <div class="bg-anim"></div>
  <div id="root"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }
    function pct(n){ return Math.round(n * 100); }
    function todayKeyLocal(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,"0");
      const day = String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${day}`;
    }
    function randomQuote(seed){
      let hh = 0;
      for(let i=0;i<seed.length;i++) hh = (hh*31 + seed.charCodeAt(i)) >>> 0;
      return QUOTES[hh % QUOTES.length];
    }
    function expToLevel(totalExp){
      const a = 120;
      let level = 1;
      let expForNext = a;
      let remaining = totalExp;
      while(remaining >= expForNext){
        remaining -= expForNext;
        level += 1;
        expForNext = Math.round(a * Math.pow(level, 1.15));
        if(level > 200) break;
      }
      return { level, expIntoLevel: remaining, expForNext };
    }
    function rankFromStreak(days){
      let cur = RANKS[0];
      for(const r of RANKS) if(days >= r.days) cur = r;
      return cur;
    }
    function msToMidnight(){
      const now = new Date();
      const midnight = new Date(now);
      midnight.setHours(24,0,0,0);
      return midnight.getTime() - now.getTime();
    }
    function formatCountdown(ms){
      const total = Math.max(0, ms);
      const s = Math.floor(total/1000);
      const hh = Math.floor(s/3600);
      const mm = Math.floor((s%3600)/60);
      const ss = s%60;
      return `${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
    }
    function parseKey(key){
      const [y,m,d] = String(key).split("-").map(Number);
      const dt = new Date(y, (m||1)-1, d||1);
      dt.setHours(12,0,0,0);
      return dt;
    }
    function formatKey(dt){
      const y = dt.getFullYear();
      const m = String(dt.getMonth()+1).padStart(2,"0");
      const d = String(dt.getDate()).padStart(2,"0");
      return `${y}-${m}-${d}`;
    }
    function addDaysKey(key, days){
      const dt = parseKey(key);
      dt.setDate(dt.getDate() + days);
      return formatKey(dt);
    }
    function diffDaysKey(aKey, bKey){
      const a = parseKey(aKey).getTime();
      const b = parseKey(bKey).getTime();
      return Math.round((b - a) / (24*60*60*1000));
    }
    function dailyMaxExpByLevel(level){
      return Math.round(220 + 18 * Math.log2(level + 1) + 0.8 * Math.sqrt(level));
    }
    function penaltyRatioByLevel(level){
      return clamp(0.95 + (Math.max(1, level) - 1) * 0.03, 0.95, 2.20);
    }
    function expPenaltyByLevel(level){
      const dailyMax = dailyMaxExpByLevel(level);
      return Math.round(dailyMax * penaltyRatioByLevel(level));
    }
    function computeToday(tasks, level){
      const totals = {
        scoreDone: 0,
        scoreTotal: 0,
        completion: 0,
        exp: 0,
        expMax: 0,
        weightedProgress: 0,
        byType: {PH:0, IQ:0, SP:0},
        byTypePotential: {PH:0, IQ:0, SP:0},
        xxTriggered: false,
      };
      const SCORE_UNIT = 10;
      let wSum = 0;
      for(const t of tasks){
        const importance = Number(t.importance || 1);
        const weight = importance * SCORE_UNIT;
        const target = Math.max(1, Number(t.target || 1));
        const done = clamp(Number(t.done || 0), 0, target);
        const ratio = target > 0 ? (done / target) : 0;
        if(t.type === "XX"){
          if(done > 0) totals.xxTriggered = true;
          continue;
        }
        totals.scoreTotal += weight;
        totals.scoreDone += weight * ratio;
        totals.byType[t.type] += weight * ratio;
        totals.byTypePotential[t.type] += weight;
        wSum += importance * TYPE_META[t.type].multiplier;
      }
      totals.completion = totals.scoreTotal > 0 ? (totals.scoreDone / totals.scoreTotal) : 0;
      if(totals.xxTriggered){
        totals.completion = Math.max(0, totals.completion - 0.5);
      }
      const dailyMax = dailyMaxExpByLevel(level);
      totals.expMax = dailyMax;
      totals.weightedProgress = wSum > 0 ? totals.completion : 0;
      totals.exp = Math.round(totals.weightedProgress * dailyMax);
      return totals;
    }

    // ---- Canvas components (same as before) ----
    function polygon(ctx, cx, cy, r, sides, rot){
      ctx.beginPath();
      for(let i=0;i<sides;i++){
        const a = rot + i*(2*Math.PI/sides);
        const x = cx + Math.cos(a)*r;
        const y = cy + Math.sin(a)*r;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.closePath();
    }
    function RadarCanvas(props){
      const ref = useRef(null);
      const prevRef = useRef({PH:0, IQ:0, SP:0});
      const animRef = useRef(null);
      function draw(vals){
        const canvas = ref.current;
        if(!canvas) return;
        const ctx = canvas.getContext("2d");
        const w = canvas.width, hh = canvas.height;
        ctx.clearRect(0,0,w,hh);
        const cx = w/2, cy = hh/2 + 10;
        const radius = Math.min(w, hh) * 0.33;
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.lineWidth = 1;
        for(let r=1;r<=4;r++){ polygon(ctx, cx, cy, radius*(r/4), 3, -Math.PI/2); ctx.stroke(); }
        const labels = ["PH","IQ","SP"];
        const angles = [ -Math.PI/2, -Math.PI/2 + (2*Math.PI/3), -Math.PI/2 + (4*Math.PI/3) ];
        labels.forEach((lab,i)=>{
          const a = angles[i];
          const x = cx + Math.cos(a)*radius;
          const y = cy + Math.sin(a)*radius;
          ctx.beginPath();
          ctx.moveTo(cx,cy);
          ctx.lineTo(x,y);
          ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.78)";
          ctx.font = "16px IBM Plex Sans Arabic, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(lab, cx + Math.cos(a)*(radius+26), cy + Math.sin(a)*(radius+18));
        });
        const pPH = (vals.PH||0)/100, pIQ = (vals.IQ||0)/100, pSP = (vals.SP||0)/100;
        const arr = [pPH,pIQ,pSP].map((v,i)=>{
          const a = angles[i];
          return { x: cx + Math.cos(a)*radius*v, y: cy + Math.sin(a)*radius*v };
        });
        ctx.beginPath();
        ctx.moveTo(arr[0].x, arr[0].y);
        ctx.lineTo(arr[1].x, arr[1].y);
        ctx.lineTo(arr[2].x, arr[2].y);
        ctx.closePath();
        ctx.fillStyle = "rgba(0,229,255,0.20)";
        ctx.fill();
        ctx.strokeStyle = "rgba(0,229,255,0.88)";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = "rgba(0,229,255,0.95)";
        arr.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill(); });
        ctx.restore();
      }
      useEffect(()=>{
        const next = props.values || {PH:0, IQ:0, SP:0};
        const from = prevRef.current;
        if(animRef.current) cancelAnimationFrame(animRef.current);
        const start = performance.now();
        const dur = 320;
        function lerp(a,b,t){ return a + (b-a)*t; }
        function ease(t){ return 1 - Math.pow(1-t, 3); }
        function step(now){
          const t = Math.min(1, (now - start) / dur);
          const k = ease(t);
          const cur = { PH: lerp(from.PH, next.PH, k), IQ: lerp(from.IQ, next.IQ, k), SP: lerp(from.SP, next.SP, k) };
          draw(cur);
          if(t < 1) animRef.current = requestAnimationFrame(step);
          else prevRef.current = {PH: next.PH, IQ: next.IQ, SP: next.SP};
        }
        animRef.current = requestAnimationFrame(step);
        return ()=> { if(animRef.current) cancelAnimationFrame(animRef.current); };
      }, [props.values]);
      return h("div", {className:"radar-wrap"}, h("canvas", {ref, width:520, height:420}));
    }
    function CommitChart(props){
      const ref = useRef(null);
      const prevYRef = useRef(null);
      const animRef = useRef(null);
      function draw(points, t=1){
        const canvas = ref.current;
        if(!canvas) return;
        const ctx = canvas.getContext("2d");
        const w = canvas.width, hh = canvas.height;
        ctx.clearRect(0,0,w,hh);
        const pad = 18;
        const innerW = w - pad*2;
        const innerH = hh - pad*2;
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.lineWidth = 1;
        for(let i=0;i<=4;i++){ const y = pad + (innerH * (i/4)); ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(w-pad, y); ctx.stroke(); }
        ctx.restore();
        if(!points || points.length < 2){
          ctx.fillStyle = "rgba(255,255,255,0.70)";
          ctx.font = "13px IBM Plex Sans Arabic, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("سيظهر المنحنى بعد أول يوم حفظ تلقائي.", w/2, hh/2);
          return;
        }
        const maxY = Math.max(1, ...points.map(p=>p.y));
        const minY = Math.min(...points.map(p=>p.y));
        const range = Math.max(1, maxY - minY);
        const xs = points.map((p, i)=>{
          const x = pad + (innerW * (i/(points.length-1)));
          const yNorm = (p.y - minY) / range;
          const y = pad + innerH - (yNorm * innerH);
          return {x,y, yVal:p.y};
        });
        const prev = prevYRef.current;
        const ys = xs.map((p,i)=>{ const py = prev && prev[i] != null ? prev[i] : p.y; return { x:p.x, y: py + (p.y - py)*t, yVal:p.yVal }; });
        ctx.beginPath();
        ctx.moveTo(ys[0].x, ys[0].y);
        for(let i=1;i<ys.length;i++) ctx.lineTo(ys[i].x, ys[i].y);
        ctx.lineTo(ys[ys.length-1].x, hh-pad);
        ctx.lineTo(ys[0].x, hh-pad);
        ctx.closePath();
        ctx.fillStyle = "rgba(0,229,255,0.10)";
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(ys[0].x, ys[0].y);
        for(let i=1;i<ys.length;i++) ctx.lineTo(ys[i].x, ys[i].y);
        ctx.strokeStyle = "rgba(0,229,255,0.92)";
        ctx.lineWidth = 2.2;
        ctx.stroke();
        ctx.fillStyle = "rgba(0,229,255,0.95)";
        for(const p of ys){ ctx.beginPath(); ctx.arc(p.x, p.y, 3.6, 0, Math.PI*2); ctx.fill(); }
        ctx.fillStyle = "rgba(255,255,255,0.70)";
        ctx.font = "12px IBM Plex Sans Arabic, sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(`الآن: ${points[points.length-1].y} يوم`, w-pad, pad+12);
        ctx.textAlign = "left";
        ctx.fillText(`البداية: ${points[0].y} يوم`, pad, pad+12);
        prevYRef.current = xs.map(p=>p.y);
      }
      useEffect(()=>{
        const points = props.points || [];
        if(animRef.current) cancelAnimationFrame(animRef.current);
        const start = performance.now();
        const dur = 420;
        function ease(t){ return 1 - Math.pow(1-t, 3); }
        function step(now){ const tt = Math.min(1, (now - start) / dur); draw(points, ease(tt)); if(tt < 1) animRef.current = requestAnimationFrame(step); }
        animRef.current = requestAnimationFrame(step);
        return ()=>{ if(animRef.current) cancelAnimationFrame(animRef.current); };
      }, [props.points]);
      return h("div", {className:"chart-wrap"}, h("canvas", {ref, width:720, height:280}));
    }
    function ExpChart(props){
      const ref = useRef(null);
      const animRef = useRef(null);
      function draw(points, t=1){
        const canvas = ref.current;
        if(!canvas) return;
        const ctx = canvas.getContext("2d");
        const w = canvas.width, hh = canvas.height;
        ctx.clearRect(0,0,w,hh);
        const pad = 18;
        const innerW = w - pad*2;
        const innerH = hh - pad*2;
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.lineWidth = 1;
        for(let i=0;i<=4;i++){ const y = pad + (innerH * (i/4)); ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(w-pad, y); ctx.stroke(); }
        ctx.restore();
        if(!points || points.length < 2){
          ctx.fillStyle = "rgba(255,255,255,0.70)";
          ctx.font = "13px IBM Plex Sans Arabic, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("سيظهر منحنى EXP بعد أول يوم حفظ تلقائي.", w/2, hh/2);
          return;
        }
        const maxY = Math.max(1, ...points.map(p=>p.y));
        const minY = Math.min(...points.map(p=>p.y));
        const range = Math.max(1, maxY - minY);
        const pts = points.map((p,i)=>{
          const x = pad + (innerW * (i/(points.length-1)));
          const yNorm = (p.y - minY) / range;
          const y = pad + innerH - (yNorm * innerH);
          return {x,y, yVal:p.y};
        });
        const shown = pts.map(p=>({x:p.x, y: pad + innerH - ((pad + innerH - p.y) * t), yVal:p.yVal}));
        ctx.beginPath();
        ctx.moveTo(shown[0].x, shown[0].y);
        for(let i=1;i<shown.length;i++) ctx.lineTo(shown[i].x, shown[i].y);
        ctx.lineTo(shown[shown.length-1].x, hh-pad);
        ctx.lineTo(shown[0].x, hh-pad);
        ctx.closePath();
        ctx.fillStyle = "rgba(168,85,247,0.10)";
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(shown[0].x, shown[0].y);
        for(let i=1;i<shown.length;i++) ctx.lineTo(shown[i].x, shown[i].y);
        ctx.strokeStyle = "rgba(168,85,247,0.92)";
        ctx.lineWidth = 2.2;
        ctx.stroke();
        ctx.fillStyle = "rgba(168,85,247,0.95)";
        for(const p of shown){ ctx.beginPath(); ctx.arc(p.x, p.y, 3.6, 0, Math.PI*2); ctx.fill(); }
        ctx.fillStyle = "rgba(255,255,255,0.70)";
        ctx.font = "12px IBM Plex Sans Arabic, sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(`Net EXP الآن: ${Math.round(points[points.length-1].y)}`, w-pad, pad+12);
      }
      useEffect(()=>{
        const points = props.points || [];
        if(animRef.current) cancelAnimationFrame(animRef.current);
        const start = performance.now();
        const dur = 420;
        function ease(t){ return 1 - Math.pow(1-t, 3); }
        function step(now){ const tt = Math.min(1, (now - start) / dur); draw(points, ease(tt)); if(tt < 1) animRef.current = requestAnimationFrame(step); }
        animRef.current = requestAnimationFrame(step);
        return ()=>{ if(animRef.current) cancelAnimationFrame(animRef.current); };
      }, [props.points]);
      return h("div", {className:"chart-wrap"}, h("canvas", {ref, width:720, height:280}));
    }

    // ---------------- Firebase state management ----------------
    function createInitialState() {
      return {
        day: todayKeyLocal(),
        tasks: [
          { id:"t1", title:"صلاة", target:5, importance:5, type:"SP", done:0 },
          { id:"t2", title:"Push-ups", target:300, importance:4, type:"PH", done:0 },
          { id:"t3", title:"قراءة", target:30, importance:3, type:"IQ", done:0 },
        ],
        totalExp: 0,
        hp: 100,
        commitDays: 0,
        shameDays: 0,
        perfectStreak: 0,
        lastCommitDay: null,
        lockedUntil: null,
        zeroLockUsed: true,
        lifetimeByType: { PH:0, IQ:0, SP:0 },
        lifetimePotentialByType: { PH:0, IQ:0, SP:0 },
        commitHistory: [],
        expHistory: [],
      };
    }

    function pushHistory(history, dateKey, value){
      const arr = Array.isArray(history) ? history.slice() : [];
      if(arr.length && arr[arr.length-1].d === dateKey){
        arr[arr.length-1] = { d: dateKey, v: value };
        return arr;
      }
      arr.push({ d: dateKey, v: value });
      return arr;
    }
    function closeOneDay(prev, dayKeyToClose, totals, qualifies, completion){
      const failHard = completion < 0.5;
      const delta = qualifies ? 6 : (failHard ? -12 : -4);
      const hp = clamp(prev.hp + delta, 0, 100);
      let lockedUntil = prev.lockedUntil;
      let zeroLockUsed = (prev.zeroLockUsed === undefined) ? true : prev.zeroLockUsed;
      if(hp > 0){
        zeroLockUsed = false;
        if(lockedUntil && Date.now() >= lockedUntil) lockedUntil = null;
      }else{
        if(!zeroLockUsed){
          lockedUntil = Date.now() + 24*60*60*1000;
          zeroLockUsed = true;
        }
      }
      const currentRank = rankFromStreak(prev.commitDays).key;
      const penaltyDays = qualifies ? 0 : (RANK_PENALTY[currentRank] ?? 0);
      const commitDays = qualifies ? (prev.commitDays + 1) : Math.max(0, prev.commitDays - penaltyDays);
      const lastCommitDay = qualifies ? dayKeyToClose : prev.lastCommitDay;
      const lifetimeByType = {
        PH: prev.lifetimeByType.PH + totals.byType.PH,
        IQ: prev.lifetimeByType.IQ + totals.byType.IQ,
        SP: prev.lifetimeByType.SP + totals.byType.SP
      };
      const lifetimePotentialByType = {
        PH: prev.lifetimePotentialByType.PH + totals.byTypePotential.PH,
        IQ: prev.lifetimePotentialByType.IQ + totals.byTypePotential.IQ,
        SP: prev.lifetimePotentialByType.SP + totals.byTypePotential.SP
      };
      const currLevel = expToLevel(prev.totalExp).level;
      const expPenalty = expPenaltyByLevel(currLevel);
      const totalExp = qualifies ? (prev.totalExp + Math.round(totals.exp)) : Math.max(0, prev.totalExp - expPenalty);
      let shameDays = Number(prev.shameDays || 0);
      let perfectStreak = Number(prev.perfectStreak || 0);
      if(completion <= 0){
        shameDays += 1;
        perfectStreak = 0;
      }else if(completion >= 1){
        perfectStreak += 1;
        if(perfectStreak >= 10){
          const removeCount = Math.floor(perfectStreak / 10);
          shameDays = Math.max(0, shameDays - removeCount);
          perfectStreak = perfectStreak % 10;
        }
      }else{
        perfectStreak = 0;
      }
      const tasks = prev.tasks.map(t => ({...t, done:0}));
      const commitHistory = pushHistory(prev.commitHistory, dayKeyToClose, commitDays);
      const expHistory = pushHistory(prev.expHistory, dayKeyToClose, totalExp);
      return {...prev, hp, lockedUntil, zeroLockUsed, commitDays, shameDays, perfectStreak, lastCommitDay, lifetimeByType, lifetimePotentialByType, totalExp, tasks, commitHistory, expHistory};
    }

    function finalizeDayNoMercy(prevState){
      const today = todayKeyLocal();
      if(prevState.day === today) return prevState;
      const gap = diffDaysKey(prevState.day, today);
      if(gap <= 0) return {...prevState, day: today};
      const MAX_CATCHUP = 90;
      const safeGap = Math.min(gap, MAX_CATCHUP);
      let s = {...prevState};
      {
        const currLevel = expToLevel(s.totalExp).level;
        const totals = computeToday(s.tasks, currLevel);
        const completion = totals.completion;
        const qualifies = completion >= 0.7;
        s = closeOneDay(s, s.day, totals, qualifies, completion);
      }
      for(let i=1;i<safeGap;i++){
        const dayKey = addDaysKey(prevState.day, i);
        const currLevel = expToLevel(s.totalExp).level;
        const totals = computeToday(s.tasks, currLevel);
        s = closeOneDay(s, dayKey, totals, false, 0);
      }
      s.day = today;
      return s;

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (usr) => {
          if(usr){
            // تحقق إضافي: إذا كان الحساب لا يزال صالحًا
            await forceSignOutIfDeleted(usr);
            // إذا لم يتم تسجيل الخروج بسبب التحقق أعلاه، نكمل تحميل البيانات
            if (auth.currentUser) {
              setUser(usr);
              const userRef = db.ref(`users/${usr.uid}`);
              const snapshot = await userRef.once('value');
              const data = snapshot.val();
              if(data && data.state){
                let loadedState = data.state;
                const todayNow = todayKeyLocal();
                if(loadedState.day !== todayNow){
                  loadedState = finalizeDayNoMercy(loadedState);
                  loadedState.day = todayNow;
                }
                setState(loadedState);
              } else {
                const fresh = createInitialState();
                setState(fresh);
                await userRef.set({ state: fresh });
              }
            } else {
              setUser(null);
            }
          } else {
            setUser(null);
            setState(createInitialState());
          }
          setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      // فحص دوري كل 5 ثوانٍ للتأكد من أن الحساب لم يُحذف
      useEffect(() => {
        if (!user) return;
        const interval = setInterval(async () => {
          await forceSignOutIfDeleted(user);
        }, 5000); // كل 5 ثوانٍ
        return () => clearInterval(interval);
      }, [user]);

      // حفظ البيانات مع التحقق من وجود المستخدم
      const saveTimeout = useRef(null);
      useEffect(() => {
        if(!user) return;
        if(saveTimeout.current) clearTimeout(saveTimeout.current);
        saveTimeout.current = setTimeout(async () => {
          try {
            await db.ref(`users/${user.uid}`).update({ state: state });
          } catch (err) {
            if (err.code === 'PERMISSION_DENIED' || err.message.includes('permission_denied')) {
              await auth.signOut();
            }
          }
        }, 500);
        return () => { if(saveTimeout.current) clearTimeout(saveTimeout.current); };
      }, [state, user]);

      // timer & glitch
      useEffect(() => { const t = setInterval(() => setCountdownMs(msToMidnight()), 1000); return () => clearInterval(t); }, []);
      useEffect(() => { const iv = setInterval(() => setGlitchIndex(prev => (prev + 1) % GLITCH_WORDS.length), 1800); return () => clearInterval(iv); }, []);

      // auto finalize day
      const finalizeRef = useRef(() => {});
      finalizeRef.current = () => {
        setState(prev => finalizeDayNoMercy(prev));
      };
      useEffect(() => {
        let to = null;
        function schedule(){
          if(to) clearTimeout(to);
          const ms = msToMidnight();
          to = setTimeout(() => { finalizeRef.current(); schedule(); }, ms + 120);
        }
        schedule();
        const iv = setInterval(() => { if(todayKeyLocal() !== state.day) finalizeRef.current(); }, 20000);
        const onVis = () => { if(document.visibilityState === "visible" && todayKeyLocal() !== state.day) finalizeRef.current(); };
        const onFocus = () => { if(todayKeyLocal() !== state.day) finalizeRef.current(); };
        document.addEventListener("visibilitychange", onVis);
        window.addEventListener("focus", onFocus);
        return () => { if(to) clearTimeout(to); clearInterval(iv); document.removeEventListener("visibilitychange", onVis); window.removeEventListener("focus", onFocus); };
      }, [state.day]);

      const level = useMemo(() => expToLevel(state.totalExp), [state.totalExp]);
      const computed = useMemo(() => computeToday(state.tasks, level.level), [state.tasks, level.level]);
      const rank = useMemo(() => rankFromStreak(state.commitDays), [state.commitDays]);
      const isLocked = useMemo(() => state.lockedUntil ? Date.now() < state.lockedUntil : false, [state.lockedUntil]);
      const lockRemaining = useMemo(() => {
        if(!state.lockedUntil) return null;
        const ms = state.lockedUntil - Date.now();
        if(ms <= 0) return null;
        return { hh: Math.floor(ms/(3600000)), mm: Math.floor((ms%3600000)/60000) };
      }, [state.lockedUntil]);
      const quote = useMemo(() => randomQuote(state.day), [state.day]);
      const radarLive = useMemo(() => {
        const g = state.lifetimeByType, p = state.lifetimePotentialByType;
        const liveGain = { PH: g.PH + computed.byType.PH, IQ: g.IQ + computed.byType.IQ, SP: g.SP + computed.byType.SP };
        const livePot = { PH: p.PH + computed.byTypePotential.PH, IQ: p.IQ + computed.byTypePotential.IQ, SP: p.SP + computed.byTypePotential.SP };
        const ph = livePot.PH>0 ? liveGain.PH/livePot.PH : 0;
        const iq = livePot.IQ>0 ? liveGain.IQ/livePot.IQ : 0;
        const sp = livePot.SP>0 ? liveGain.SP/livePot.SP : 0;
        return { PH: Math.round(ph*100), IQ: Math.round(iq*100), SP: Math.round(sp*100) };
      }, [state.lifetimeByType, state.lifetimePotentialByType, computed.byType, computed.byTypePotential]);
      const commitPoints = useMemo(() => (state.commitHistory||[]).map((x,i)=>({ x:i, y:Number(x.v||0), d:x.d })), [state.commitHistory]);
      const expPoints = useMemo(() => (state.expHistory||[]).map((x,i)=>({ x:i, y:Number(x.v||0), d:x.d })), [state.expHistory]);
      const expPenaltyPreview = useMemo(() => expPenaltyByLevel(level.level), [level.level]);

      function updateTask(id, patch){
        setState(prev => ({...prev, tasks: prev.tasks.map(t => t.id===id ? {...t, ...patch} : t)}));
      }
      function removeTask(id){
        setState(prev => ({...prev, tasks: prev.tasks.filter(t => t.id!==id)}));
      }
      function addTask(title, target, importance, type){
        const clean = String(title||"").trim();
        if(!clean) return;
        setState(prev => ({...prev, tasks: prev.tasks.concat([{ id:`t${Math.random().toString(16).slice(2)}`, title: clean, target: clamp(Number(target)||1,1,9999), importance: Number(importance), type, done:0 }])}));
      }

      const handleLogout = async () => {
        await auth.signOut();
        setUser(null);
        setState(createInitialState());
      };

      if(loading){
        return h("div", {className:"loading"}, "جاري التحميل...");
      }
      if(!user){
        return h(LoginPage, { onLoginSuccess: () => {} });
      }

      const currentWord = GLITCH_WORDS[glitchIndex];
      const isSelfWord = currentWord === "نفسك";
      return h("div", {className:"wrap"},
        h("header", {className:"header"},
          h("div", {className:"hero-glow"}),
          h("div", {className:"top-row"},
            h("div", null,
              h("div", {className:"badge"}, h("span", {className:"dot"}), h("span", {className:"brand-name"}, "RISE SYSTEM™"), h("span", {className:"brand-sub"}, "No-Mercy Mode")),
              h("h1", {className:"title"}, "طوّر شخصيتك… مثل ", h("span", {className:`glitch-word ${isSelfWord ? "self-word" : ""}`, "data-text": currentWord}, currentWord)),
              h("p", {className:"subtitle"}, "لوحة التطوير اليومية مع قاعدة بيانات Firebase لكل مستخدم."),
              h("div", {className:"chips"}, h("div", {className:"chip"}, h("span", null, "اليوم:"), h("span", {className:"chip-mono"}, state.day)), state.lastCommitDay ? h("div", {className:"chip"}, h("span", null, "آخر يوم محسوب:"), h("span", {className:"chip-mono"}, state.lastCommitDay)) : null),
              h("div", {className:"header-actions"},
                h("button", {className:`nav-btn ${page==="dashboard" ? "active" : ""}`, onClick:()=>setPage("dashboard")}, "لوحة النظام"),
                h("button", {className:`nav-btn ${page==="manual" ? "active" : ""}`, onClick:()=>setPage("manual")}, "كتيب التعليمات"),
                h("button", {className:"nav-btn", onClick:handleLogout}, "تسجيل الخروج")
              )
            ),
            h("div", {className:"stats"},
              h("div", {className:"stat stat-hp"}, h("div", {className:"stat-k"}, "HP"), h("div", {className:"stat-v"}, `${state.hp}/100`), h("div", {className:"stat-s"}, state.hp===0 ? "قفل 24 ساعة" : (state.hp>=70 ? "مستقر" : "خطر"))),
              h("div", {className:"stat stat-level"}, h("div", {className:"stat-k"}, "LEVEL"), h("div", {className:"stat-v"}, String(level.level)), h("div", {className:"stat-s"}, `${level.expIntoLevel}/${level.expForNext} EXP`)),
              h("div", {className:"stat stat-rank"}, h("div", {className:"stat-k"}, "RANK"), h("div", {className:"stat-v"}, rank.label), h("div", {className:"stat-s"}, `${state.commitDays} يوم التزام`))
            )
          )
        ),
        page === "dashboard"
          ? h(DashboardPage, { state, setState, level, computed, rank, isLocked, lockRemaining, countdownMs, quote, radarLive, commitPoints, expPoints, expPenaltyPreview, newTitle, setNewTitle, newTarget, setNewTarget, newImportance, setNewImportance, newType, setNewType, addTask, updateTask, removeTask })
          : h(ManualPage),
        h("footer", {className:"footer"}, h("div", null, `متصل كـ: ${user.email}`), h("div", null, "البيانات محفوظة في Firebase — يمكنك الدخول من أي جهاز."), h("div", null, "RISE SYSTEM™ — No-Mercy Mode."))
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
