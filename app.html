<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>... (جميع الأنماط كما هي، حذفتها لعدم التكرار لكن في الكود النهائي موجودة) ...</head>
<body>
<div id="root"></div>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
  const firebaseConfig = { ... }; // نفس البيانات
  const app = firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  auth.setPersistence(firebase.auth.Auth.Persistence.NONE);
  const db = firebase.firestore();
  
  // ... كل المساعدات والدوال كما هي (حذفتها للاختصار لكنها موجودة في الكود النهائي)
  
  function DashboardPage(props) { /* نفس الكود السابق */ }
  function ManualPage() { /* نفس الكود السابق */ }
  function LoginPage({ onLoginSuccess }) { /* نفس الكود السابق */ }
  
  // ========== App باستخدام Firestore ==========
  function App(){
    const [user, setUser] = useState(null);
    const [loading, setLoading] = useState(true);
    const [loadError, setLoadError] = useState(null);
    const [state, setState] = useState(null);
    const [page, setPage] = useState("dashboard");
    const [countdownMs, setCountdownMs] = useState(msToMidnight());
    const [glitchIndex, setGlitchIndex] = useState(1);
    const [newTitle, setNewTitle] = useState("");
    const [newTarget, setNewTarget] = useState(10);
    const [newImportance, setNewImportance] = useState(3);
    const [newType, setNewType] = useState("PH");

    const forceSignOutIfDeleted = async (currentUser) => {
      if (!currentUser) return;
      try { await currentUser.getIdToken(true); } catch (error) {
        if (error.code === 'auth/user-not-found' || error.code === 'auth/user-disabled') await auth.signOut();
      }
    };

    useEffect(() => {
      const unsubscribe = auth.onAuthStateChanged(async (usr) => {
        setLoadError(null);
        if (usr) {
          try {
            setUser(usr);
            const docRef = db.collection("users").doc(usr.uid);
            const docSnap = await docRef.get();
            let loadedState;
            if (docSnap.exists) {
              loadedState = docSnap.data().state;
              if (loadedState.tasks && Array.isArray(loadedState.tasks)) {
                loadedState.tasks = loadedState.tasks.map(t => ({ ...t, done: t.done !== undefined ? t.done : 0 }));
              }
              const today = todayKeyLocal();
              if (loadedState.day !== today) {
                loadedState = finalizeDayNoMercy(loadedState);
                loadedState.day = today;
              }
            } else {
              loadedState = createInitialState();
              await docRef.set({ state: loadedState });
            }
            setState(loadedState);
          } catch (err) {
            console.error("Load error:", err);
            setLoadError("فشل تحميل البيانات من Firestore. تأكد من الاتصال بالإنترنت.");
          } finally { setLoading(false); }
        } else {
          setUser(null);
          setState(null);
          setLoading(false);
        }
      });
      return () => unsubscribe();
    }, []);

    const saveTimeout = useRef(null);
    useEffect(() => {
      if (!user || state === null) return;
      if (saveTimeout.current) clearTimeout(saveTimeout.current);
      saveTimeout.current = setTimeout(async () => {
        try {
          await db.collection("users").doc(user.uid).update({ state: state });
        } catch (err) {
          console.error("Save error:", err);
          if (err.code === 'permission-denied') auth.signOut();
        }
      }, 500);
      return () => { if (saveTimeout.current) clearTimeout(saveTimeout.current); };
    }, [state, user]);

    useEffect(() => { if (user) { const interval = setInterval(() => forceSignOutIfDeleted(user), 5000); return () => clearInterval(interval); } }, [user]);
    useEffect(() => { const t = setInterval(() => setCountdownMs(msToMidnight()), 1000); return () => clearInterval(t); }, []);
    useEffect(() => { const iv = setInterval(() => setGlitchIndex(prev => (prev + 1) % GLITCH_WORDS.length), 1800); return () => clearInterval(iv); }, []);

    const finalizeRef = useRef(() => {});
    finalizeRef.current = () => { if (state !== null) setState(prev => finalizeDayNoMercy(prev)); };
    useEffect(() => {
      let to = null;
      function schedule(){ if(to) clearTimeout(to); const ms = msToMidnight(); to = setTimeout(() => { finalizeRef.current(); schedule(); }, ms + 120); }
      schedule();
      const iv = setInterval(() => { if (state !== null && todayKeyLocal() !== state.day) finalizeRef.current(); }, 20000);
      const onVis = () => { if (document.visibilityState === "visible" && state !== null && todayKeyLocal() !== state.day) finalizeRef.current(); };
      const onFocus = () => { if (state !== null && todayKeyLocal() !== state.day) finalizeRef.current(); };
      document.addEventListener("visibilitychange", onVis); window.addEventListener("focus", onFocus);
      return () => { if(to) clearTimeout(to); clearInterval(iv); document.removeEventListener("visibilitychange", onVis); window.removeEventListener("focus", onFocus); };
    }, [state]);

    const updateTask = (id, patch) => setState(prev => prev ? { ...prev, tasks: prev.tasks.map(t => t.id === id ? { ...t, ...patch } : t) } : prev);
    const removeTask = (id) => setState(prev => prev ? { ...prev, tasks: prev.tasks.filter(t => t.id !== id) } : prev);
    const addTask = (title, target, importance, type) => {
      const clean = String(title || "").trim();
      if (!clean) return;
      setState(prev => prev ? { ...prev, tasks: [...prev.tasks, { id: `t${Math.random().toString(16).slice(2)}`, title: clean, target: clamp(Number(target)||1,1,9999), importance: Number(importance), type, done: 0 }] } : prev);
    };
    const handleLogout = async () => { await auth.signOut(); setUser(null); setState(null); };

    if (loading) return h("div", { className: "loading" }, "جاري التحميل...");
    if (loadError) return h("div", { className: "error-loading" }, loadError);
    if (!user || state === null) return h(LoginPage, { onLoginSuccess: () => {} });

    const level = expToLevel(state.totalExp);
    const computed = computeToday(state.tasks, level.level);
    const rank = rankFromStreak(state.commitDays);
    const isLocked = state.lockedUntil ? Date.now() < state.lockedUntil : false;
    const lockRemaining = (() => { if (!state.lockedUntil) return null; const ms = state.lockedUntil - Date.now(); if (ms <= 0) return null; return { hh: Math.floor(ms / 3600000), mm: Math.floor((ms % 3600000) / 60000) }; })();
    const quote = randomQuote(state.day);
    const radarLive = (() => {
      const g = state.lifetimeByType, p = state.lifetimePotentialByType;
      const liveGain = { PH: g.PH + computed.byType.PH, IQ: g.IQ + computed.byType.IQ, SP: g.SP + computed.byType.SP };
      const livePot = { PH: p.PH + computed.byTypePotential.PH, IQ: p.IQ + computed.byTypePotential.IQ, SP: p.SP + computed.byTypePotential.SP };
      const ph = livePot.PH > 0 ? liveGain.PH / livePot.PH : 0, iq = livePot.IQ > 0 ? liveGain.IQ / livePot.IQ : 0, sp = livePot.SP > 0 ? liveGain.SP / livePot.SP : 0;
      return { PH: Math.round(ph * 100), IQ: Math.round(iq * 100), SP: Math.round(sp * 100) };
    })();
    const commitPoints = (state.commitHistory || []).map((x, i) => ({ x: i, y: Number(x.v || 0), d: x.d }));
    const expPoints = (state.expHistory || []).map((x, i) => ({ x: i, y: Number(x.v || 0), d: x.d }));
    const expPenaltyPreview = expPenaltyByLevel(level.level);
    const currentWord = GLITCH_WORDS[glitchIndex];
    const isSelfWord = currentWord === "نفسك";

    return h("div", { className: "wrap" },
      h("header", { className: "header" }, ... ), // نفس الهيدر السابق
      page === "dashboard" ? h(DashboardPage, { state, setState, level, computed, rank, isLocked, lockRemaining, countdownMs, quote, radarLive, commitPoints, expPoints, expPenaltyPreview, newTitle, setNewTitle, newTarget, setNewTarget, newImportance, setNewImportance, newType, setNewType, addTask, updateTask, removeTask }) : h(ManualPage),
      h("footer", { className: "footer" }, ... )
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
