<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=yes, viewport-fit=cover" />
  <title>RISE SYSTEM™ | No Mercy (Firestore)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&family=IBM+Plex+Sans+Arabic:wght@100..700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; min-height: 100vh; min-height: 100dvh; overflow-x: hidden; position: relative; scroll-behavior: smooth; }
    body { margin: 0; padding: 0; font-family: var(--font-sans); color: hsl(var(--foreground)); background: hsl(var(--background)); overflow-x: hidden; width: 100%; position: relative; }
    #root { width: 100%; max-width: 100%; overflow-x: hidden; position: relative; min-height: 100vh; min-height: 100dvh; }
    :root{
      --background: 235 35% 6%;
      --foreground: 210 40% 96%;
      --chart-1: 195 100% 55%;
      --chart-2: 280 85% 64%;
      --chart-3: 155 80% 48%;
      --chart-4: 35 95% 58%;
      --chart-5: 0 84% 60%;
      --font-sans: "IBM Plex Sans Arabic", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --font-display: "Oxanium", "IBM Plex Sans Arabic", system-ui, sans-serif;
    }
    .bg-anim{
      position:fixed; inset:-18%; z-index:-2;
      background:
        radial-gradient(1200px 900px at 20% 25%, hsl(var(--chart-2) / 0.22), transparent 60%),
        radial-gradient(1100px 850px at 80% 30%, hsl(var(--chart-1) / 0.22), transparent 62%),
        radial-gradient(1000px 800px at 25% 85%, hsl(var(--chart-3) / 0.18), transparent 60%),
        radial-gradient(900px 700px at 85% 80%, hsl(var(--chart-4) / 0.10), transparent 62%),
        linear-gradient(to bottom, hsl(235 35% 6%), hsl(240 32% 7%));
      background-size: 140% 140%;
      animation: spaceDrift 18s ease-in-out infinite;
      transform: translateZ(0);
      will-change: transform, filter, background-position;
      pointer-events: none;
    }
    .bg-anim::before{
      content:"";
      position:absolute; inset:0;
      background:
        conic-gradient(from 210deg at 50% 50%,
          transparent 0deg,
          hsl(var(--chart-1) / 0.07) 70deg,
          transparent 140deg,
          hsl(var(--chart-2) / 0.07) 220deg,
          transparent 360deg);
      filter: blur(20px);
      opacity: .95;
      animation: nebulaSpin 28s linear infinite;
      mix-blend-mode: screen;
      pointer-events:none;
    }
    .bg-anim::after{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,.12) 0 1px, transparent 2px),
        radial-gradient(circle at 35% 40%, rgba(255,255,255,.10) 0 1px, transparent 2px),
        radial-gradient(circle at 70% 25%, rgba(255,255,255,.12) 0 1px, transparent 2px),
        radial-gradient(circle at 85% 55%, rgba(255,255,255,.10) 0 1px, transparent 2px),
        radial-gradient(circle at 20% 80%, rgba(255,255,255,.10) 0 1px, transparent 2px),
        radial-gradient(circle at 55% 78%, rgba(255,255,255,.08) 0 1px, transparent 2px);
      opacity:.55;
      filter: blur(.2px);
      animation: starsFloat 14s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes spaceDrift{
      0%   { background-position: 45% 55%; transform: scale(1); filter: hue-rotate(0deg); }
      50%  { background-position: 60% 40%; transform: scale(1.03); filter: hue-rotate(10deg); }
      100% { background-position: 45% 55%; transform: scale(1); filter: hue-rotate(0deg); }
    }
    @keyframes nebulaSpin{ from{ transform: rotate(0deg); } to{ transform: rotate(360deg); } }
    @keyframes starsFloat{
      0%   { transform: translate(0px,0px); opacity:.50; }
      50%  { transform: translate(14px,-10px); opacity:.60; }
      100% { transform: translate(0px,0px); opacity:.50; }
    }
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
    .wrap{max-width:1200px; margin:0 auto; padding:28px 16px 40px; width:100%;}
    .header{position:relative}
    .hero-glow{
      position:absolute; top:-40px; left:50%; transform:translateX(-50%);
      width:760px; height:200px; border-radius:999px;
      background: radial-gradient(circle at center, hsl(var(--chart-1) / 0.28), transparent 62%);
      filter: blur(22px);
      pointer-events:none;
      opacity:.9;
    }
    .top-row{display:flex; gap:16px; align-items:flex-end; justify-content:space-between; flex-wrap:wrap;}
    .badge{
      display:inline-flex; align-items:center; gap:10px;
      padding:8px 12px; border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      font-size:12px; color: rgba(255,255,255,.92);
    }
    .dot{width:10px;height:10px;border-radius:50%; background:hsl(var(--chart-1)); box-shadow: 0 0 18px hsl(var(--chart-1) / .60);}
    .brand-name{font-family:var(--font-display); letter-spacing:.6px}
    .brand-sub{color:rgba(255,255,255,.60)}
    .title{margin:12px 0 6px; font-family:var(--font-display); font-size:40px; line-height:1.1;}
    .subtitle{margin:0; max-width:760px; color:rgba(255,255,255,.78); font-size:14.5px; line-height:1.7;}
    .glitch-word{
      position: relative;
      display: inline-block;
      color: hsl(var(--foreground));
      text-shadow:
        0 0 8px rgba(255,255,255,.08),
        0 0 18px hsl(var(--chart-1) / .16);
      animation: glitch-skew 2.6s infinite ease-in-out;
      white-space: nowrap;
    }
    .glitch-word::before,
    .glitch-word::after{
      content: attr(data-text);
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .9;
    }
    .glitch-word::before{
      color: hsl(var(--chart-1));
      transform: translate(-2px, 0);
      clip-path: inset(0 0 55% 0);
      animation: glitch-top 1.1s infinite linear alternate-reverse;
      mix-blend-mode: screen;
    }
    .glitch-word::after{
      color: hsl(var(--chart-5));
      transform: translate(2px, 0);
      clip-path: inset(45% 0 0 0);
      animation: glitch-bottom 1.35s infinite linear alternate-reverse;
      mix-blend-mode: screen;
    }
    .glitch-word.self-word{
      text-shadow:
        0 0 10px rgba(255,255,255,.10),
        0 0 20px hsl(var(--chart-2) / .22),
        0 0 28px hsl(var(--chart-5) / .16);
      animation: self-glitch-skew .9s infinite steps(2,end);
    }
    .glitch-word.self-word::before{
      color: hsl(var(--chart-2));
      transform: translate(-4px, -1px);
      clip-path: inset(0 0 62% 0);
      animation: self-glitch-top .45s infinite steps(2,end);
      opacity: .95;
    }
    .glitch-word.self-word::after{
      color: hsl(var(--chart-5));
      transform: translate(4px, 1px);
      clip-path: inset(58% 0 0 0);
      animation: self-glitch-bottom .38s infinite steps(2,end);
      opacity: .95;
    }
    @keyframes glitch-top{
      0%   { transform: translate(-2px, 0); }
      20%  { transform: translate(-3px, -1px); }
      40%  { transform: translate(-1px, 1px); }
      60%  { transform: translate(-4px, 0); }
      80%  { transform: translate(-2px, 1px); }
      100% { transform: translate(-3px, -1px); }
    }
    @keyframes glitch-bottom{
      0%   { transform: translate(2px, 0); }
      20%  { transform: translate(4px, 1px); }
      40%  { transform: translate(1px, -1px); }
      60%  { transform: translate(3px, 0); }
      80%  { transform: translate(2px, -1px); }
      100% { transform: translate(4px, 1px); }
    }
    @keyframes glitch-skew{
      0%, 100% { transform: skewX(0deg); }
      20%      { transform: skewX(-2deg); }
      21%      { transform: skewX(3deg); }
      22%      { transform: skewX(0deg); }
      65%      { transform: skewX(0deg); }
      66%      { transform: skewX(-3deg); }
      67%      { transform: skewX(2deg); }
      68%      { transform: skewX(0deg); }
    }
    @keyframes self-glitch-top{
      0%   { transform: translate(-5px,-1px); }
      25%  { transform: translate(-1px,2px); }
      50%  { transform: translate(-6px,0px); }
      75%  { transform: translate(-2px,-2px); }
      100% { transform: translate(-4px,1px); }
    }
    @keyframes self-glitch-bottom{
      0%   { transform: translate(5px,1px); }
      25%  { transform: translate(2px,-2px); }
      50%  { transform: translate(6px,0px); }
      75%  { transform: translate(3px,2px); }
      100% { transform: translate(4px,-1px); }
    }
    @keyframes self-glitch-skew{
      0%   { transform: skewX(0deg) scale(1); }
      20%  { transform: skewX(5deg) scale(1.01); }
      40%  { transform: skewX(-4deg) scale(.995); }
      60%  { transform: skewX(3deg) scale(1.01); }
      80%  { transform: skewX(-5deg) scale(.995); }
      100% { transform: skewX(0deg) scale(1); }
    }
    .chips{margin-top:12px; display:flex; flex-wrap:wrap; gap:8px;}
    .chip{ display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px; border:1px solid rgba(255,255,255,.14); background: rgba(0,0,0,.18); font-size:12px; color: rgba(255,255,255,.82); }
    .chip-mono{font-family: ui-monospace, monospace; color: rgba(255,255,255,.92)}
    .header-actions{ margin-top:16px; display:flex; flex-wrap:wrap; gap:10px; }
    .nav-btn{ cursor:pointer; border:1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.06); color: rgba(255,255,255,.96); padding:10px 14px; border-radius:16px; font-size:13px; transition:.15s; }
    .nav-btn:hover{background: rgba(255,255,255,.10)}
    .nav-btn.active{ border-color:hsl(var(--chart-1)/.35); background:hsl(var(--chart-1)/.16); box-shadow:0 0 18px hsl(var(--chart-1)/.18); }
    .stats{display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; width:370px; max-width:100%;}
    .stat{ border-radius:18px; padding:12px; border:1px solid rgba(255,255,255,.14); background: rgba(0,0,0,.20); }
    .stat-k{font-size:11px; letter-spacing:2px; color: rgba(255,255,255,.72)}
    .stat-v{margin-top:6px; font-family:var(--font-display); font-size:22px}
    .stat-s{margin-top:4px; font-size:11px; color: rgba(255,255,255,.66)}
    .stat-hp{border-color:hsl(var(--chart-3) / .35); background:hsl(var(--chart-3) / .12)}
    .stat-level{border-color:hsl(var(--chart-1) / .35); background:hsl(var(--chart-1) / .12)}
    .stat-rank{border-color:hsl(var(--chart-2) / .35); background:hsl(var(--chart-2) / .12)}
    .locked{ margin-top:16px; border-radius:18px; border:1px solid hsl(var(--chart-5) / .35); background:hsl(var(--chart-5) / .12); padding:10px 14px; }
    .locked-row{display:flex; justify-content:space-between; align-items:center; gap:10px; color: rgba(255,255,255,.95); font-size:13px;}
    .main{margin-top:22px; display:grid; gap:14px; grid-template-columns:1.35fr .65fr;}
    @media (max-width:980px){ .main{grid-template-columns:1fr} }
    .card{ border-radius:24px; border:1px solid rgba(255,255,255,.14); background: rgba(0,0,0,.20); padding:14px; width:100%; overflow-x:hidden; }
    .label{font-size:11px; letter-spacing:2px; color: rgba(255,255,255,.70)}
    .section-title{margin-top:6px; font-family:var(--font-display); font-size:18px}
    .muted{color: rgba(255,255,255,.70); font-size:12px}
    .tiny{display:flex; justify-content:space-between; gap:10px; color: rgba(255,255,255,.64); font-size:11px}
    .card-row{display:flex; gap:12px; align-items:flex-end; justify-content:space-between; flex-wrap:wrap;}
    .quote{margin-top:6px; font-family:var(--font-display); font-size:18px; color: rgba(255,255,255,.95);}
    .progress-row{display:flex; gap:14px; align-items:flex-end; justify-content:space-between; flex-wrap:wrap;}
    .big{margin-top:6px; font-family: var(--font-display); font-size:34px}
    .progress-side{width:280px; max-width:100%}
    .bar{width:100%; height:10px; border-radius:999px; background: rgba(255,255,255,.12); overflow:hidden;}
    .fill{height:100%; width:0%; background:hsl(var(--chart-1)); box-shadow: 0 0 18px hsl(var(--chart-1)/.35); transition: width .25s ease; }
    .task-list{margin-top:12px; display:grid; gap:10px;}
    .task{border-radius:18px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); padding:12px;}
    .task-top{display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;}
    .tag{ display:inline-flex; align-items:center; gap:8px; border-radius:999px; border:1px solid rgba(255,255,255,.18); padding:6px 10px; font-size:11px; }
    .tag.ph{background:hsl(var(--chart-3)/.16); color:hsl(var(--chart-3)); border-color:hsl(var(--chart-3)/.28)}
    .tag.iq{background:hsl(var(--chart-1)/.16); color:hsl(var(--chart-1)); border-color:hsl(var(--chart-1)/.28)}
    .tag.sp{background:hsl(var(--chart-2)/.16); color:hsl(var(--chart-2)); border-color:hsl(var(--chart-2)/.28)}
    .tag.xx{background:hsl(var(--chart-5)/.16); color:hsl(var(--chart-5)); border-color:hsl(var(--chart-5)/.28)}
    .task-title{font-family:var(--font-display); font-size:15px; color: rgba(255,255,255,.96); max-width:360px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
    .task-meta{margin-top:6px; display:flex; flex-wrap:wrap; gap:10px; font-size:11px; color: rgba(255,255,255,.70)}
    .task-controls{display:flex; align-items:center; gap:8px;}
    .input{ width:100%; padding:10px 12px; border-radius:16px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); color: rgba(255,255,255,.96); outline:none; }
    .input:disabled{opacity:.6}
    .small{width:92px; padding:8px 10px; border-radius:14px;}
    .btn{ cursor:pointer; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); color: rgba(255,255,255,.96); padding:10px 14px; border-radius:18px; transition:.15s; }
    .btn:hover{background: rgba(255,255,255,.10)}
    .btn:disabled{opacity:.55; cursor:not-allowed}
    .btn-green{ width:44px; padding:10px 0; border-color:hsl(var(--chart-3)/.30); background:hsl(var(--chart-3)/.18); }
    .btn-green:hover{background:hsl(var(--chart-3)/.24)}
    .add-grid{margin-top:12px; display:grid; gap:10px; grid-template-columns: 1.4fr .6fr .6fr .6fr .2fr;}
    @media (max-width:980px){ .add-grid{grid-template-columns:1fr 1fr;} .btn-green{width:100%} }
    .radar-wrap{ margin-top:10px; width:100%; border-radius:18px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); overflow:hidden; display:flex; justify-content:center; align-items:center; padding:8px; }
    .radar-wrap canvas{max-width:100%; height:auto; width:100%;}
    .mini-stats{margin-top:10px; display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
    .mini{border-radius:18px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); padding:10px;}
    .mini-v{font-family:var(--font-display); font-size:20px;}
    .mini-v span{font-size:12px; color: rgba(255,255,255,.55)}
    .mini-l{margin-top:4px; font-size:11px; color: rgba(255,255,255,.68)}
    .note{ margin-top:10px; border-radius:18px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); padding:10px; color: rgba(255,255,255,.78); font-size:13px; line-height:1.65; }
    .chart-wrap{ margin-top:10px; width:100%; border-radius:18px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); overflow:hidden; padding:10px; }
    .chart-wrap canvas{width:100%; height:auto; display:block;}
    .footer{ margin-top:18px; padding-top:14px; border-top:1px solid rgba(255,255,255,.14); color: rgba(255,255,255,.70); font-size:12px; display:flex; flex-direction:column; gap:6px; }
    .countdown{ margin-top:10px; display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px 12px; border-radius:18px; border:1px solid rgba(255,255,255,.14); background: rgba(0,0,0,.18); }
    .shame-panel{ margin-top:12px; border-radius:18px; border:1px solid hsl(var(--chart-5) / .35); background:hsl(var(--chart-5) / .12); padding:12px; }
    .shame-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .shame-title{ font-size:11px; letter-spacing:2px; color: rgba(255,255,255,.75); }
    .shame-value{ font-family:var(--font-display); font-size:28px; color:hsl(var(--chart-5)); text-shadow:0 0 16px hsl(var(--chart-5) / .30); min-width:72px; text-align:center; margin-inline-start:auto; padding-inline-start:10px; }
    .shame-sub{ margin-top:6px; font-size:12px; color: rgba(255,255,255,.72); }
    .manual-layout{ margin-top:22px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media (max-width:980px){ .manual-layout{grid-template-columns:1fr} }
    .manual-list{display:grid; gap:10px; margin-top:12px;}
    .manual-step{border-radius:18px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); padding:12px;}
    .manual-step-title{font-family:var(--font-display); font-size:15px; margin-bottom:6px; color:rgba(255,255,255,.96);}
    .manual-step-text{color:rgba(255,255,255,.76); font-size:13px; line-height:1.75;}
    .manual-highlight{ border-radius:20px; border:1px solid hsl(var(--chart-1)/.30); background:hsl(var(--chart-1)/.10); padding:14px; margin-top:12px; color:rgba(255,255,255,.88); line-height:1.8; font-size:13px; }
    .manual-warning{ border-radius:20px; border:1px solid hsl(var(--chart-5)/.34); background:hsl(var(--chart-5)/.12); padding:14px; margin-top:12px; color:rgba(255,255,255,.88); line-height:1.8; font-size:13px; }
    .manual-grid{ margin-top:12px; display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    @media (max-width:700px){ .manual-grid{grid-template-columns:1fr} }
    .login-container{ min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card{ max-width: 420px; width: 100%; border-radius: 36px; border: 1px solid rgba(255,255,255,.16); background: rgba(0,0,0,.55); backdrop-filter: blur(8px); padding: 32px 28px; text-align: center; box-shadow: 0 25px 45px rgba(0,0,0,.5); }
    .login-title{ font-family: var(--font-display); font-size: 32px; margin-bottom: 8px; }
    .login-sub{ color: rgba(255,255,255,.7); font-size: 14px; margin-bottom: 32px; }
    .login-input{ width: 100%; margin-bottom: 18px; padding: 14px 18px; border-radius: 28px; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.05); color: white; font-size: 15px; outline: none; transition: .2s; }
    .login-input:focus{ border-color: hsl(var(--chart-1)/.6); background: rgba(255,255,255,.08); }
    .login-btn{ width: 100%; padding: 12px; border-radius: 40px; background: hsl(var(--chart-1)/.2); border: 1px solid hsl(var(--chart-1)/.5); color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: .2s; font-family: var(--font-display); }
    .login-btn:hover{ background: hsl(var(--chart-1)/.4); box-shadow: 0 0 14px hsl(var(--chart-1)/.3); }
    .login-error{ color: hsl(var(--chart-5)); margin-top: 12px; font-size: 13px; }
    .loading{ text-align: center; padding: 40px; font-size: 18px; }
    .error-loading{ color: hsl(var(--chart-5)); text-align: center; padding: 20px; font-size: 14px; background: rgba(0,0,0,0.5); border-radius: 20px; margin: 20px; }
    @media (max-width: 768px) {
      .wrap { width: 100%; max-width: 100%; padding: 16px 12px 32px; margin: 0 auto; }
      .stats { width: 100%; grid-template-columns: 1fr; }
      .radar-wrap canvas, .chart-wrap canvas { width: 100% !important; height: auto !important; max-width: 100%; }
      .card { width: 100%; overflow-x: hidden; }
      .top-row { flex-direction: column; align-items: stretch; }
      .badge { align-self: flex-start; }
      .header-actions { justify-content: center; }
      .progress-row { flex-direction: column; align-items: flex-start; }
      .progress-side { width: 100%; }
      .add-grid {
